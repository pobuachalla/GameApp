<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GAA Match Tracker</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<meta name="theme-color" content="#4C9A3A">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4F5F2;display:flex;justify-content:center;}
:root{
  --bg1:#FFFFFF;--bg2:#F4F5F2;--bg3:#E2E4DE;
  --bgi:#e6f1fb;--bgd:#F8D7D7;--bgs:#DFF3E3;--bgw:#FFF1D6;
  --t1:#1F1F1F;--t2:#6B6F66;--t3:#9A9E99;
  --ti:#0c447c;--td:#991B1B;--ts:#2E7D32;--tw:#B45309;
  --b:rgba(0,0,0,0.10);--bm:rgba(0,0,0,0.18);
  --bi:#378add;--bd:#C62828;--bs:#2E7D32;--bw:#F59E0B;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){
  body{background:#1a1a18;}
  :root{
    --bg1:#2c2c2a;--bg2:#222220;--bg3:#1a1a18;
    --bgi:#042c53;--bgd:#3d0e0e;--bgs:#0d2e12;--bgw:#3a1e00;
    --t1:#f0ede6;--t2:#9A9E99;--t3:#6B6F66;
    --ti:#85b7eb;--td:#f09595;--ts:#6abf69;--tw:#ffb74d;
    --b:rgba(255,255,255,0.1);--bm:rgba(255,255,255,0.2);
  }
}
#app{width:100%;max-width:460px;height:100%;display:flex;flex-direction:column;position:relative;color:var(--t1);}
.scroll{flex:1;min-height:0;overflow-y:auto;padding:10px 10px 0;display:flex;flex-direction:column;}
.timer-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg2);border-radius:var(--rl);margin-bottom:10px;}
#timer-display{font-size:44px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-1.5px;line-height:1;flex-shrink:0;color:var(--t1);}
.timer-btns{display:flex;gap:8px;flex:1;justify-content:flex-end;align-items:center;}
.t-btn{padding:9px 16px;border-radius:999px;font-size:14px;font-weight:500;cursor:pointer;border-width:1px;border-style:solid;font-family:inherit;touch-action:manipulation;white-space:nowrap;}
.scoreboard{background:var(--bg1);border-radius:18px;margin-bottom:10px;overflow:hidden;border:1.5px solid var(--bm);box-shadow:0 3px 16px rgba(0,0,0,0.13);flex-shrink:0;}
.score-inner{display:flex;align-items:stretch;padding:8px 6px 6px;}
.team-lbl{font-size:10px;font-weight:500;letter-spacing:.05em;color:var(--t2);text-align:center;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.div-v{width:.5px;background:var(--b);align-self:stretch;margin:0 4px;flex-shrink:0;}
.p-row{display:flex;gap:10px;justify-content:space-around;margin-bottom:10px;}
.pbtn{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.92);color:#1a1a18;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;touch-action:manipulation;transition:transform .1s,background .15s;line-height:1.1;text-align:center;padding:2px;position:relative;font-family:inherit;}
.pbtn:active{transform:scale(.91);}
.pbtn.hev{background:rgba(180,212,244,0.95);color:#0c447c;border-color:rgba(55,138,221,0.8);}
.pbtn.rc{background:rgba(252,235,235,0.92)!important;color:#a32d2d!important;border-color:rgba(226,75,74,0.7)!important;opacity:.55!important;cursor:not-allowed!important;pointer-events:none!important;}
.pbtn.sub{border-style:dashed;}
.subdot{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;background:#25D366;border:1px solid rgba(255,255,255,0.8);}
.cap-badge{position:absolute;top:1px;right:1px;font-size:10px;color:#2E7D32;background:#fff;border-radius:50%;width:13px;height:13px;display:flex;align-items:center;justify-content:center;line-height:1;}
.cap-btn{background:none;border:none;cursor:pointer;padding:0 0 0 6px;font-size:18px;flex-shrink:0;line-height:1;display:flex;align-items:center;touch-action:manipulation;}
.cap-btn.active{color:#2E7D32;}
.cap-btn.inactive{color:#C8CAC4;}
.card-y{position:absolute;top:3px;left:3px;width:5px;height:8px;border-radius:1.5px;background:#FDD835;border:.5px solid rgba(0,0,0,0.2);}
.card-b{position:absolute;top:3px;left:10px;width:5px;height:8px;border-radius:1.5px;background:#2c2c2a;border:.5px solid rgba(255,255,255,0.2);}
.card-r{position:absolute;top:3px;left:3px;width:5px;height:8px;border-radius:1.5px;background:#E53935;border:.5px solid rgba(0,0,0,0.2);}
.bot-bar{display:flex;align-items:stretch;border-top:.5px solid var(--bm);background:var(--bg1);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);border-radius:var(--rl) var(--rl) 0 0;margin:10px 10px 0;}
.bar-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:14px 8px;cursor:pointer;border:none;background:none;color:var(--t2);font-size:10px;font-weight:500;letter-spacing:.04em;touch-action:manipulation;font-family:inherit;}
.bar-btn:active{background:var(--bg2);}
.bar-btn.danger{color:var(--td);}
.bar-btn:disabled{opacity:.3;cursor:default;}
.bar-div{width:.5px;background:var(--b);align-self:stretch;margin:8px 0;}
.overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.48);z-index:50;padding:44px 12px 12px;}
.modal-box{background:var(--bg1);border-radius:var(--rl);border:.5px solid var(--b);padding:14px;max-height:82vh;overflow-y:auto;}
.full-panel{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg1);z-index:60;padding:14px;flex-direction:column;}
.full-panel.open{display:flex;}
.panel-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-shrink:0;}
.back-btn{width:36px;height:36px;border-radius:50%;border:.5px solid var(--bm);background:var(--bg1);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;}
.back-btn:active{background:var(--bg2);}
.abtn{display:inline-flex;width:100%;padding:14px;margin-bottom:0;text-align:center;align-items:center;justify-content:center;gap:10px;background:var(--bg1);border:.5px solid var(--b);border-radius:999px;color:var(--t1);font-size:15px;cursor:pointer;font-family:inherit;}
.abtn i{font-size:1em;display:inline-flex;align-items:center;justify-content:center;}
.abtn:active{background:var(--bg2);}
.score-btn-goal{background:#DFF3E3;color:#2E7D32;border-color:rgba(46,125,50,0.3);}
.score-btn-point{background:#FFFFFF;color:#1F1F1F;border-color:#C8CAC4;}
.score-btn-2p{background:#FFF1D6;color:#D97706;border-color:rgba(217,119,6,0.35);}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.action-group{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.action-group:last-child{margin-bottom:0;}
.action-group-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t2);padding:0 2px;}
.action-btn-wide{background:#F4F5F2;color:#4A4A4A;border-color:#C8CAC4;}
.action-btn-neutral{background:var(--bg2);color:var(--t2);border-color:var(--b);}
.action-btn-red{background:#FFEBEE;color:#E53935;border-color:rgba(229,57,53,0.25);}
.action-btn-yellow{background:#FFFDE7;color:#F9A825;border-color:rgba(249,168,37,0.3);}
.action-btn-black{background:#F4F5F2;color:#2c2c2a;border-color:#C8CAC4;}
.action-btn-sub{background:#F0FAF2;color:#2E7D32;border-color:rgba(46,125,50,0.25);}
.ev-row{display:flex;gap:10px;padding:7px 0;border-bottom:.5px solid var(--b);font-size:13px;align-items:flex-start;cursor:default;transition:background .1s;}
.ev-row:last-child{border-bottom:none;}
.ev-row.selected{background:var(--bgi);}
.ev-row.sel-mode{cursor:pointer;}
.ev-row.sel-mode:active{background:var(--bg2);}
.ev-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--bm);background:var(--bg1);flex-shrink:0;display:none;align-items:center;justify-content:center;margin-top:1px;}
.ev-row.sel-mode .ev-check{display:flex;}
.ev-row.selected .ev-check{background:var(--bgi);border-color:var(--bi);}
.ev-time{color:var(--t2);min-width:40px;flex-shrink:0;}
.ev-bdg{font-size:11px;padding:2px 6px;border-radius:999px;font-weight:500;flex-shrink:0;}
.remove-bar{display:none;align-items:center;justify-content:space-between;padding:10px 13px;border-top:.5px solid var(--b);background:var(--bgd);gap:10px;}
.remove-bar.show{display:flex;}
.remove-bar-label{font-size:13px;color:var(--td);font-weight:500;}
.remove-bar-btn{padding:7px 16px;border-radius:999px;background:var(--td);color:#fff;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;touch-action:manipulation;}
.remove-bar-btn:active{opacity:.85;}
.sel-toggle{padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;border:.5px solid var(--bm);background:none;color:var(--t2);font-family:inherit;touch-action:manipulation;}
.sel-toggle.active{background:var(--bgi);color:var(--ti);border-color:var(--bi);}
.bg{background:#DFF3E3;color:#2E7D32;}
.bp{background:#FFFFFF;color:#1F1F1F;border:1px solid #C8CAC4;}
.bw{background:#EBEBEB;color:#4A4A4A;}
.bc{background:#FFF9E6;color:#8A6A00;}
.br{background:#FFEBEE;color:#E53935;}
.by{background:#FFFDE7;color:#F9A825;}
.bs{background:#e8f8ed;color:#1a7a3c;}
.bo,.badj{background:var(--bg2);color:var(--t2);}
.bopp{background:var(--bgw);color:var(--tw);}
.brstr{background:#e1f5ee;color:#0f6e56;}
.bperiod{background:var(--bgi);color:var(--ti);}
.sinput{width:100%;padding:9px 11px;border:.5px solid var(--bm);border-radius:var(--r);background:var(--bg1);color:var(--t1);font-size:14px;font-family:inherit;}
.sinput:focus{outline:none;border-color:var(--bi);}
.prow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid var(--b);}
.prow:last-child{border-bottom:none;}
.pbadge{width:32px;height:32px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(46,125,50,0.35);background:#DFF3E3;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#2E7D32;}
.pbadge.gk{border-color:rgba(249,168,37,0.4);color:#B45309;background:#FFF1D6;}
.pbadge.sub{border-color:var(--bm);color:var(--t2);background:var(--bg3);}
.stitle{font-size:11px;font-weight:500;color:var(--t2);letter-spacing:.06em;margin:14px 0 7px;}
.tplrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--b);}
.tplrow:last-child{border-bottom:none;}
.tplbtn{padding:5px 12px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;border:.5px solid var(--bm);background:var(--bg1);color:var(--t1);font-family:inherit;}
.tplbtn.load{border-color:var(--bi);color:var(--ti);}
.tplbtn.del{border-color:var(--bd);color:var(--td);}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px 14px;background:#25D366;color:#fff;border:none;border-radius:0 0 var(--rl) var(--rl);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;}
.wa-btn:active{opacity:.85;}
.toast{position:absolute;bottom:72px;left:50%;transform:translateX(-50%);background:var(--t1);color:var(--bg1);padding:8px 18px;border-radius:999px;font-size:13px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;}
.toast.show{opacity:1;}
.sarow{display:flex;flex-direction:column;gap:2px;}
.score-adj-btn{width:52px;height:52px;border-radius:12px;border:1.5px solid var(--bm);background:var(--bg1);color:var(--t2);font-size:17px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;font-family:inherit;line-height:1;}
.score-adj-btn:active{background:var(--bg2);transform:scale(.93);}
@keyframes flash-red{0%,100%{opacity:1}50%{opacity:.2}}
.overtime{animation:flash-red 1s ease-in-out infinite;color:#E24B4A;}
.gaa-toggle-wrap{display:block;width:100%;position:relative;cursor:pointer;user-select:none;}
.gaa-toggle-wrap input{display:none;}
.gaa-toggle-track{width:100%;height:52px;border-radius:var(--rl);background:var(--bg3);border:1.5px solid var(--bm);display:flex;align-items:center;position:relative;overflow:hidden;}
.gaa-toggle-opt{flex:1;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;z-index:1;pointer-events:none;transition:color .25s;color:var(--t2);}
.gaa-toggle-knob{position:absolute;top:4px;bottom:4px;width:calc(50% - 4px);left:4px;border-radius:calc(var(--rl) - 2px);background:#2E7D32;box-shadow:0 1px 6px rgba(0,0,0,.18);transition:left .25s;z-index:0;}
.gaa-toggle-wrap input:checked + .gaa-toggle-track .gaa-toggle-knob{left:50%;}
/* Hurling selected: baseball yellow */
.gaa-toggle-wrap input:not(:checked) + .gaa-toggle-track .gaa-toggle-opt:nth-of-type(1){color:#FDD835;}
/* Football selected: volleyball white */
.gaa-toggle-wrap input:checked + .gaa-toggle-track .gaa-toggle-opt:nth-of-type(2){color:#fff;}
/* Size opt text */
.gaa-toggle-opt.size-opt{font-size:15px;font-weight:700;}
/* Size: active number white */
.gaa-toggle-wrap input:not(:checked) + .gaa-toggle-track .gaa-toggle-opt.size-opt:nth-of-type(1){color:#fff;}
.gaa-toggle-wrap input:checked + .gaa-toggle-track .gaa-toggle-opt.size-opt:nth-of-type(2){color:#fff;}
.setup-save-btn{padding:9px 18px;border-radius:var(--rl);background:#2E7D32;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;touch-action:manipulation;}
.setup-save-btn:active{opacity:.85;}
.setup-secondary-btn{padding:9px 14px;border-radius:var(--rl);background:var(--bg2);color:var(--t2);border:1.5px solid var(--bm);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit;touch-action:manipulation;}
.setup-secondary-btn:active{background:var(--bg3);}
.timer-card{background:var(--bg1);border-radius:var(--rl);border:1.5px solid var(--bm);padding:14px 14px 12px;margin-bottom:10px;display:flex;flex-direction:column;gap:10px;flex-shrink:0;}
.timer-meta{display:flex;align-items:center;gap:8px;}
.period-badge{font-size:11px;font-weight:600;letter-spacing:.06em;padding:3px 10px;border-radius:999px;background:#DFF3E3;color:#2E7D32;text-transform:uppercase;}
.period-badge.halftime{background:#F3E8C8;color:#8A6A00;}
.period-badge.fulltime{background:#F8D7D7;color:#991B1B;}
.status-chip{font-size:11px;font-weight:500;padding:3px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;}
.status-chip.running{background:#DFF3E3;color:#2E7D32;}
.status-chip.paused{background:#FFF1D6;color:#B45309;}
.status-chip.halftime{background:#F3E8C8;color:#8A6A00;}
.status-chip.fulltime{background:#F8D7D7;color:#991B1B;}
#timer-display{flex:1;text-align:center;font-size:52px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-2px;line-height:1;color:var(--t1);}
#timer-display.muted{color:var(--t2);}
.timer-body{display:flex;align-items:center;gap:10px;}
.timer-primary-btn{flex:0 0 88px;min-height:52px;border-radius:var(--rl);font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;touch-action:manipulation;transition:opacity .1s,transform .1s;}
.timer-primary-btn:active{opacity:.85;transform:scale(.98);}
.timer-primary-btn.green{background:#2E7D32;color:#fff;border:1.5px solid #2E7D32;}
.timer-primary-btn.amber{background:#F59E0B;color:#fff;border:1.5px solid #F59E0B;}
.timer-primary-btn.blue{background:#2E7D32;color:#fff;border:1.5px solid #2E7D32;}
.timer-secondary-btn{flex:0 0 88px;min-height:52px;border-radius:var(--rl);border:1.5px solid var(--bm);background:var(--bg2);color:var(--t2);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;touch-action:manipulation;transition:opacity .1s,transform .1s;}
.timer-secondary-btn.end-half{background:#D97706;color:#fff;border-color:#D97706;}
.timer-secondary-btn.end-match{background:#C62828;color:#fff;border-color:#C62828;}
.timer-secondary-btn:active{opacity:.85;transform:scale(.98);}
/* ── Stats panel ──────────────────────────────────────────────────────────── */
.stats-overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.42);z-index:70;}
.stats-overlay.open{display:block;}
.stats-panel{position:absolute;left:0;right:0;bottom:0;background:var(--bg1);border-radius:18px 18px 0 0;z-index:71;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:86%;display:flex;flex-direction:column;}
.stats-panel.open{transform:translateY(0);}
.stats-handle{width:40px;height:4px;background:var(--bm);border-radius:2px;margin:12px auto 4px;flex-shrink:0;cursor:pointer;}
.stats-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 10px;flex-shrink:0;border-bottom:.5px solid var(--b);}
.stats-scroll{flex:1;overflow-y:auto;padding:0 14px 32px;}
.stat-section{margin-top:16px;}
.stat-section-title{font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;}
.stat-card{background:var(--bg2);border-radius:var(--rl);padding:12px 14px;margin-bottom:6px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid var(--b);}
.stat-row:last-child{border-bottom:none;}
.stat-lbl{font-size:13px;color:var(--t2);}
.stat-val{font-size:14px;font-weight:600;color:var(--t1);}
.stat-big{font-size:28px;font-weight:700;color:var(--ts);text-align:center;padding:10px 0 2px;line-height:1;}
.stat-big-sub{font-size:12px;color:var(--t2);text-align:center;padding-bottom:8px;}
.stat-sub-hdr{font-size:12px;font-weight:600;color:var(--t2);margin:10px 0 4px;}
.stat-prow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:.5px solid var(--b);}
.stat-prow:last-child{border-bottom:none;}
.stat-pname{font-size:13px;color:var(--t1);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.stat-ptags{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
.stat-tag{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:500;}
.stat-tag.green{background:#DFF3E3;color:#2E7D32;}
.stat-tag.red{background:#F8D7D7;color:#991B1B;}
.stat-tag.yellow{background:#FFF1D6;color:#B45309;}
.stat-tag.grey{background:var(--bg3);color:var(--t2);border:.5px solid var(--b);}
.stat-tag.black{background:#e8e8e8;color:#333;}
.disc-chip{display:inline-flex;width:11px;height:15px;border-radius:2px;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,.18);}
.disc-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:.5px solid var(--b);}
.disc-row:last-child{border-bottom:none;}
.disc-chips{display:flex;gap:3px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.momentum-card{background:var(--bg2);border-radius:var(--rl);padding:14px 14px 10px;margin-bottom:6px;}
.momentum-bar{height:12px;border-radius:6px;overflow:hidden;display:flex;background:var(--bg3);}
.momentum-us{background:#2E7D32;transition:width .5s cubic-bezier(.4,0,.2,1);min-width:4px;}
.momentum-opp{background:#6B6F66;flex:1;min-width:4px;}
.momentum-feet{display:flex;justify-content:space-between;align-items:flex-start;margin-top:10px;}
.momentum-team{display:flex;flex-direction:column;gap:2px;max-width:45%;}
.momentum-team.right{align-items:flex-end;}
.momentum-name{font-size:12px;font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
.momentum-pct{font-size:20px;font-weight:700;line-height:1;}
.momentum-basis{font-size:10px;color:var(--t3);text-align:center;margin-top:8px;letter-spacing:.02em;}
.stat-attempt-bar{height:10px;border-radius:5px;overflow:hidden;display:flex;margin:12px 0 6px;background:var(--bg3);}
.stat-attempt-seg{height:100%;}
.stat-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.stat-legend-item{font-size:10px;color:var(--t2);display:flex;align-items:center;gap:3px;}
.stat-legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0;}
.stat-ring-wrap{display:flex;align-items:center;gap:16px;padding:6px 0 8px;}
.stat-ring{width:68px;height:68px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.stat-ring-inner{width:46px;height:46px;border-radius:50%;background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.stat-ring-pct{font-size:14px;font-weight:700;color:var(--t1);line-height:1;}
.stat-ring-lbl{font-size:9px;color:var(--t2);letter-spacing:.03em;}
.stat-split-bar{height:8px;border-radius:4px;overflow:hidden;display:flex;margin:6px 0 4px;background:#F8D7D7;}
.stat-split-won{background:#2E7D32;min-width:0;transition:width .4s;}
.stat-split-labels{display:flex;justify-content:space-between;font-size:11px;margin-bottom:8px;}
/* ── Layout panel ─────────────────────────────────────────────────────────── */
.layout-scroll{flex:1;overflow-y:auto;padding:0 12px 32px;}
.layout-team-hdr{text-align:center;padding:6px 0 12px;flex-shrink:0;border-bottom:.5px solid var(--b);margin-bottom:4px;}
.layout-team-name{font-size:18px;font-weight:700;color:var(--t1);}
.layout-vs{font-size:12px;color:var(--t2);margin-top:2px;}
.layout-formation{display:flex;flex-direction:column;gap:6px;padding:12px 0 8px;}
.layout-row{display:flex;justify-content:center;gap:8px;}
.layout-player{display:flex;flex-direction:column;align-items:center;width:78px;gap:4px;}
.layout-shirt-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:52px;height:52px;}
.layout-shirt-icon{font-size:48px;color:#2E7D32;line-height:1;}
.layout-shirt-num{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:700;color:#fff;pointer-events:none;line-height:1;white-space:nowrap;}
.layout-cap-badge{position:absolute;top:-3px;right:-5px;width:17px;height:17px;border-radius:50%;background:#FDD835;color:#1F1F1F;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;z-index:2;border:1.5px solid #fff;line-height:1;}
.layout-player-name{font-size:10px;color:var(--t1);text-align:center;line-height:1.35;word-break:break-word;max-width:78px;font-weight:500;}
.layout-subs-wrap{border-top:.5px solid var(--b);padding-top:12px;margin-top:4px;}
.layout-subs-title{font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;}
.layout-subs-grid{display:flex;flex-wrap:wrap;gap:8px 6px;}
.layout-sub-player{display:flex;flex-direction:column;align-items:center;width:52px;gap:3px;}
.layout-sub-shirt-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:36px;height:36px;}
.layout-sub-shirt{font-size:32px;color:#9E9E9E;line-height:1;}
.layout-sub-num{position:absolute;top:9px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:#fff;pointer-events:none;line-height:1;}
.layout-sub-name{font-size:9px;color:var(--t2);text-align:center;line-height:1.3;word-break:break-word;max-width:52px;}
</style>
</head>
<body>

<script>
'use strict';

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const ACTS  = ['Goal','Point','2 Point','Wide','Free','Red Card','Yellow Card','Black Card','Substitution'];
const SSEC  = ['From Play','From Free','From Penalty','From 65'];
const FSEC  = ['Push','Chop','Steps','Tackle','Pickup','Throw'];
const NS    = {Goal:SSEC,Point:SSEC,'2 Point':SSEC,Wide:SSEC,Free:FSEC};
const SAVE_KEY = 'gaa_match_v1';
const DEFAULT_US = 'Donaghmore/Ashbourne';

// ─── STATE (single source of truth) ──────────────────────────────────────────
const state = {
  goals:0, pts:0, og:0, op_:0,
  period:1, secs:0,
  matchState:'PRE_MATCH',
  tStarted:false, tStopped:false,
  tWallStart:null, tPausedAt:0,
  usN:DEFAULT_US, oppN:'Opposition',
  pnames:{}, slotp:{}, ubench:{}, suboff:{},
  rcarded:{}, ycarded:{}, bcarded:{},
  playerGoals:{}, playerPts:{},
  maxB:17,
  evts:[],   // {time, desc, badge, cls, slot?, action?}
  sport:'hurling', // 'hurling' or 'football'
  teamSize:15,     // 15 or 13
  captain:null,    // slot number of captain, or null
};
for (let i = 1; i <= 15; i++) state.slotp[i] = i;

// ─── SESSION STATE (not persisted) ────────────────────────────────────────────
let undos   = [];
let selMode = false;
let selSlot = null, pendAct = null, subOff = null;
let pendScoreAdj = null; // {type, d, side} for pending score adjustment
let tInt    = null;
let tRun    = false;
let modalHandlerRef = null;
let initialsCache = {};

// ─── DOM CACHE ────────────────────────────────────────────────────────────────
const el = {};
function initEl() {
  ['timer-display','gc','pc','og','op','utotal','ototal','uslbl','opplbl',
   'evlog','logempty','lcnt','lbdg','toast','modal','mtitle','mopts',
   'period-badge','status-chip','timer-primary-btn','timer-secondary-btn',
   'pgrid','logpanel','setpanel','seltoggle',
   'removebar','removelbl','sun','son','pslist','bslist','tpllist','tni','starting-lbl'
  ].forEach(id => { el[id] = document.getElementById(id); });
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');
const fmt = s => pad(Math.floor(s/60))+':'+pad(s%60);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const gn  = i => (state.pnames[i]||'').trim();
const pl  = i => { const n=gn(i); return n ? esc(n)+' (#'+i+')' : '#'+i; };

// ─── INITIALS CACHE ───────────────────────────────────────────────────────────
function buildInitialsCache() {
  initialsCache = {};
  const all = Object.keys(state.pnames).map(Number);
  all.forEach(i => { initialsCache[i] = computeInitials(i, all); });
}

function computeInitials(i, all) {
  const nm = gn(i); if (!nm) return String(i);
  const p = nm.split(/\s+/), fi = p[0][0].toUpperCase();
  if (p.length === 1) return fi;
  const surname = p[p.length-1];
  let surnameKey = '', hasO = false;
  if (/^[OÓ]'/i.test(surname)) {
    surnameKey = surname[0].toUpperCase() + surname.substring(2).toUpperCase(); hasO = true;
  } else if (p.length >= 3 && /^[OÓ]$/i.test(p[p.length-2])) {
    surnameKey = p[p.length-2].toUpperCase() + surname.toUpperCase(); hasO = true;
  } else {
    surnameKey = surname.toUpperCase();
  }
  const minEx = hasO && surnameKey.length >= 2 ? 2 : 1;
  for (let ex = 1; ex <= surnameKey.length; ex++) {
    const c = fi + surnameKey.substring(0, ex);
    let clash = false;
    for (const oi of all) {
      if (oi === i) continue;
      const on = gn(oi); if (!on) continue;
      const op2 = on.split(/\s+/); if (op2.length < 2) continue;
      const oSn = op2[op2.length-1];
      let oKey = '';
      if (/^[OÓ]'/i.test(oSn)) oKey = oSn[0].toUpperCase()+oSn.substring(2).toUpperCase();
      else if (op2.length>=3 && /^[OÓ]$/i.test(op2[op2.length-2])) oKey = op2[op2.length-2].toUpperCase()+oSn.toUpperCase();
      else oKey = oSn.toUpperCase();
      if (op2[0][0].toUpperCase()+oKey.substring(0,ex) === c) { clash=true; break; }
    }
    if (!clash && ex >= minEx) return c;
  }
  return fi + surnameKey.substring(0, Math.min(2, surnameKey.length));
}

const gi = i => initialsCache[i] !== undefined ? initialsCache[i] : String(i);

// ─── PLAYER BUTTON (targeted rebuild) ────────────────────────────────────────
function refBtn(s) {
  const b = document.querySelector('[data-s="'+s+'"]'); if (!b) return;
  const pi = state.slotp[s], ini = gi(pi);
  while (b.firstChild) b.removeChild(b.firstChild);
  if (state.ycarded[s]) { const e=document.createElement('span'); e.className='card-y'; b.appendChild(e); }
  if (state.bcarded[s]) { const e=document.createElement('span'); e.className='card-b'; b.appendChild(e); }
  if (state.rcarded[s]) { const e=document.createElement('span'); e.className='card-r'; b.appendChild(e); }
  if (state.ubench[pi]) { const e=document.createElement('span'); e.className='subdot'; b.appendChild(e); }
  if (state.captain === s) { const e=document.createElement('i'); e.className='fa-regular fa-copyright cap-badge'; b.appendChild(e); }
  const wrap = document.createElement('span');
  wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:0;line-height:1;';
  const iniSpan = document.createElement('span');
  iniSpan.textContent = ini;
  iniSpan.style.fontSize = ini.length>=4?'10px':ini.length===3?'11px':ini.length===2?'12px':'14px';
  iniSpan.style.color = '#2E7D32';
  wrap.appendChild(iniSpan);
  const g = state.playerGoals[pi]||0, p_ = state.playerPts[pi]||0;
  if (g > 0 || p_ > 0) {
    const sc = document.createElement('span');
    sc.textContent = g+'-'+p_;
    sc.style.cssText = 'font-size:9px;font-weight:400;opacity:0.75;margin-top:1px;';
    wrap.appendChild(sc);
  }
  b.appendChild(wrap);
}
const refAllBtns = () => { const sz=state.teamSize||15; for (let s=1; s<=sz; s++) refBtn(s); };

// ─── PERSISTENCE ──────────────────────────────────────────────────────────────
let saveStateTimeoutId = null;
function saveState() {
  if (saveStateTimeoutId) clearTimeout(saveStateTimeoutId);
  saveStateTimeoutId = setTimeout(() => {
    try {
      const {goals,pts,og,op_,period,secs,matchState,tPausedAt,tWallStart,
             usN,oppN,pnames,slotp,ubench,suboff,rcarded,ycarded,bcarded,
             playerGoals,playerPts,maxB,evts,sport,teamSize,captain} = state;
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        goals,pts,og,op_,period,secs,matchState,tPausedAt,tWallStart,
        usN,oppN,pnames,slotp,ubench,suboff,rcarded,ycarded,bcarded,
        playerGoals,playerPts,maxB,evts,sport,teamSize,captain
      }));
    } catch(e) {}
    saveStateTimeoutId = null;
  }, 500);
}

function loadSavedState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    Object.assign(state, JSON.parse(raw));
    return true;
  } catch(e) { return false; }
}

const clearSavedState = () => { try { localStorage.removeItem(SAVE_KEY); } catch(e) {} };

function saveStateImmediate() {
  if (saveStateTimeoutId) { clearTimeout(saveStateTimeoutId); saveStateTimeoutId = null; }
  try {
    const {goals,pts,og,op_,period,secs,matchState,tPausedAt,tWallStart,
           usN,oppN,pnames,slotp,ubench,suboff,rcarded,ycarded,bcarded,
           playerGoals,playerPts,maxB,evts,sport,teamSize} = state;
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      goals,pts,og,op_,period,secs,matchState,tPausedAt,tWallStart,
      usN,oppN,pnames,slotp,ubench,suboff,rcarded,ycarded,bcarded,
      playerGoals,playerPts,maxB,evts,sport,teamSize
    }));
  } catch(e) {}
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    // Flush current secs if timer is running so reload gets accurate time
    if (tRun && state.tWallStart) {
      state.secs = Math.floor((Date.now() - state.tWallStart) / 1000);
    }
    saveStateImmediate();
  }
});

// ─── MATCH STATE MACHINE ──────────────────────────────────────────────────────
const periodLabel = n => ['1st Half','2nd Half','1st Half ET','2nd Half ET'][n-1] || ('Period '+n);
const periodBadge = n => ['1H','2H','ET1','ET2'][n-1] || ('P'+n);

const VALID_TRANSITIONS = {
  PRE_MATCH:            ['RUNNING_FIRST_HALF'],
  RUNNING_FIRST_HALF:   ['PAUSED_FIRST_HALF','HALF_TIME'],
  PAUSED_FIRST_HALF:    ['RUNNING_FIRST_HALF','HALF_TIME'],
  HALF_TIME:            ['RUNNING_SECOND_HALF'],
  RUNNING_SECOND_HALF:  ['PAUSED_SECOND_HALF','FULL_TIME'],
  PAUSED_SECOND_HALF:   ['RUNNING_SECOND_HALF','FULL_TIME'],
  FULL_TIME:            [],
};

function transition(newState) {
  const allowed = VALID_TRANSITIONS[state.matchState];
  if (!allowed || !allowed.includes(newState)) return;
  const prev = state.matchState;
  state.matchState = newState;
  applyStateEffects(prev, newState);
  renderTimerUI();
  saveState();
}

function applyStateEffects(prev, next) {
  const now = new Date();
  const clockStr = pad(now.getHours())+':'+pad(now.getMinutes());

  switch (next) {
    case 'RUNNING_FIRST_HALF':
      if (prev === 'PRE_MATCH') {
        state.period = 1;
        state.secs = 0;
        state.tWallStart = Date.now();
        state.tPausedAt = 0;
        tRun = true;
        startInterval();
        el['timer-display'].textContent = '00:00';
        el['timer-display'].classList.remove('overtime','muted');
        addRow('00:00','1H','bperiod','1st Half started at '+clockStr);
        pushUndo('1st Half started',()=>{});
        setGrid(true);
      } else {
        state.tWallStart = Date.now() - state.tPausedAt * 1000;
        tRun = true;
        startInterval();
        el['timer-display'].classList.remove('muted');
        setGrid(true);
      }
      break;

    case 'PAUSED_FIRST_HALF':
      if (state.tWallStart) {
        state.tPausedAt = Math.floor((Date.now() - state.tWallStart) / 1000);
        state.secs = state.tPausedAt;
      }
      tRun = false;
      stopInterval();
      break;

    case 'HALF_TIME':
      if (state.tWallStart) {
        state.tPausedAt = Math.floor((Date.now() - state.tWallStart) / 1000);
        state.secs = state.tPausedAt;
      }
      tRun = false;
      stopInterval();
      state.tWallStart = null;
      el['timer-display'].classList.add('muted');
      el['timer-display'].classList.remove('overtime');
      addRow(fmt(state.secs),'1H','bperiod','1st Half ended at '+clockStr);
      pushUndo('1st Half ended',()=>{});
      setGrid(false);
      break;

    case 'RUNNING_SECOND_HALF':
      if (prev === 'HALF_TIME') {
        state.period = 2;
        state.secs = 0;
        state.tWallStart = Date.now();
        state.tPausedAt = 0;
        tRun = true;
        startInterval();
        el['timer-display'].textContent = '00:00';
        el['timer-display'].classList.remove('overtime','muted');
        addRow('00:00','2H','bperiod','2nd Half started at '+clockStr);
        pushUndo('2nd Half started',()=>{});
        setGrid(true);
      } else {
        state.tWallStart = Date.now() - state.tPausedAt * 1000;
        tRun = true;
        startInterval();
        el['timer-display'].classList.remove('muted');
        setGrid(true);
      }
      break;

    case 'PAUSED_SECOND_HALF':
      if (state.tWallStart) {
        state.tPausedAt = Math.floor((Date.now() - state.tWallStart) / 1000);
        state.secs = state.tPausedAt;
      }
      tRun = false;
      stopInterval();
      break;

    case 'FULL_TIME':
      if (state.tWallStart) {
        state.tPausedAt = Math.floor((Date.now() - state.tWallStart) / 1000);
        state.secs = state.tPausedAt;
      }
      tRun = false;
      stopInterval();
      state.tWallStart = null;
      el['timer-display'].classList.add('muted');
      setGrid(false);
      showFullTimeResult();
      break;
  }
}

function renderTimerUI() {
  const s = state.matchState;
  const isRunning = s==='RUNNING_FIRST_HALF' || s==='RUNNING_SECOND_HALF';
  const isPaused  = s==='PAUSED_FIRST_HALF'  || s==='PAUSED_SECOND_HALF';
  const inFirst   = s==='RUNNING_FIRST_HALF' || s==='PAUSED_FIRST_HALF';
  const inSecond  = s==='RUNNING_SECOND_HALF'|| s==='PAUSED_SECOND_HALF';

  // Period badge
  const pb = el['period-badge'];
  pb.classList.remove('halftime','fulltime');
  if      (s==='HALF_TIME')  { pb.textContent='Half-Time'; pb.classList.add('halftime'); }
  else if (s==='FULL_TIME')  { pb.textContent='Full-Time'; pb.classList.add('fulltime'); }
  else if (inSecond)         { pb.textContent='2nd Half'; }
  else                       { pb.textContent='1st Half'; }

  // Status chip
  const sc = el['status-chip'];
  if (isRunning) {
    sc.style.display='';
    sc.className='status-chip running';
    sc.innerHTML='<i class="fas fa-clock" aria-hidden="true"></i> Running';
  } else if (isPaused) {
    sc.style.display='';
    sc.className='status-chip paused';
    sc.innerHTML='<i class="fas fa-circle-pause" aria-hidden="true"></i> Paused';
  } else {
    sc.style.display='none';
  }

  // Primary button
  const primBtn = el['timer-primary-btn'];
  const primIcon = document.getElementById('timer-primary-icon');
  const primMap  = {
    PRE_MATCH:           {icon:'fa-play',    cls:'green'},
    RUNNING_FIRST_HALF:  {icon:'fa-pause',   cls:'amber'},
    PAUSED_FIRST_HALF:   {icon:'fa-play',    cls:'blue'},
    HALF_TIME:           {icon:'fa-forward', cls:'green'},
    RUNNING_SECOND_HALF: {icon:'fa-pause',   cls:'amber'},
    PAUSED_SECOND_HALF:  {icon:'fa-play',    cls:'blue'},
  };
  const pc = primMap[s];
  if (pc) {
    primBtn.style.visibility='';
    primBtn.className='timer-primary-btn '+pc.cls;
    primIcon.className='fas '+pc.icon;
  } else {
    primBtn.style.visibility='hidden';
  }

  // Secondary button
  const secBtn  = el['timer-secondary-btn'];
  const secIcon = document.getElementById('timer-secondary-icon');
  const secLbl  = document.getElementById('timer-secondary-label');
  if (inFirst) {
    secBtn.style.visibility='';
    secBtn.className='timer-secondary-btn end-half';
    secIcon.className='fas fa-hourglass-half';
    secLbl.textContent='End Half';
  } else if (inSecond) {
    secBtn.style.visibility='';
    secBtn.className='timer-secondary-btn end-match';
    secIcon.className='fas fa-flag-checkered';
    secLbl.textContent='End Match';
  } else {
    secBtn.style.visibility='hidden';
    secBtn.className='timer-secondary-btn';
  }
}

function timerPrimaryAction() {
  switch (state.matchState) {
    case 'PRE_MATCH':           transition('RUNNING_FIRST_HALF');  break;
    case 'RUNNING_FIRST_HALF':  transition('PAUSED_FIRST_HALF');   break;
    case 'PAUSED_FIRST_HALF':   transition('RUNNING_FIRST_HALF');  break;
    case 'HALF_TIME':           transition('RUNNING_SECOND_HALF'); break;
    case 'RUNNING_SECOND_HALF': transition('PAUSED_SECOND_HALF');  break;
    case 'PAUSED_SECOND_HALF':  transition('RUNNING_SECOND_HALF'); break;
  }
}

function timerSecondaryAction() {
  const s = state.matchState;
  if (s==='RUNNING_FIRST_HALF' || s==='PAUSED_FIRST_HALF')   handleEndHalf();
  else if (s==='RUNNING_SECOND_HALF' || s==='PAUSED_SECOND_HALF') handleEndMatch();
}

function handleEndHalf() {
  el.mtitle.textContent = 'End First Half?';
  el.mopts.innerHTML =
    '<p style="font-size:14px;color:var(--t2);padding:4px 0 14px;line-height:1.5;">Start half-time and stop the timer.</p>'
   +'<button class="abtn confirm-action-btn" style="font-weight:600;border-color:var(--bm);"><i class="fas fa-triangle-exclamation" aria-hidden="true"></i> Confirm End Half</button>';
  el.modal.style.display = 'block';
  el.mopts.querySelector('.confirm-action-btn').addEventListener('click', () => { closeMod(); transition('HALF_TIME'); });
}

function handleEndMatch() {
  el.mtitle.textContent = 'End Match?';
  el.mopts.innerHTML =
    '<p style="font-size:14px;color:var(--t2);padding:4px 0 14px;line-height:1.5;">Mark the game as full-time and stop the timer.</p>'
   +'<button class="abtn confirm-action-btn" style="font-weight:600;border-color:var(--bm);"><i class="fas fa-triangle-exclamation" aria-hidden="true"></i> Confirm End Match</button>';
  el.modal.style.display = 'block';
  el.mopts.querySelector('.confirm-action-btn').addEventListener('click', () => { closeMod(); transition('FULL_TIME'); });
}

function startInterval() {
  stopInterval();
  tInt = setInterval(tick, 500);
}

function stopInterval() {
  if (tInt) { clearInterval(tInt); tInt = null; }
}

function tick() {
  if (!state.tWallStart) return;
  const elapsed = Math.floor((Date.now() - state.tWallStart) / 1000);
  state.secs = elapsed;
  const td = el['timer-display'];
  td.textContent = fmt(elapsed);
  if (elapsed >= 1800 && !td.classList.contains('overtime')) td.classList.add('overtime');
  if (elapsed % 30 === 0) saveState();
}

function setGrid(on) {
  el.pgrid.style.opacity       = on ? '1' : '.3';
  el.pgrid.style.pointerEvents = on ? 'auto' : 'none';
}

// ─── SCORER SUMMARY ───────────────────────────────────────────────────────────
const PLACED_BALL = new Set(['From Free','From Penalty','From 65','From 45']);

function buildScorerSummary() {
  const scorers = {}; // pi -> {name, gPlay,gPlaced,pPlay,pPlaced}
  state.evts.forEach(ev => {
    if (!ev.slot || !ev.action) return;
    const a = ev.action;
    if (a !== 'Goal' && a !== 'Point' && a !== '2 Point') return;
    const pi = state.slotp[ev.slot];
    if (!pi) return;
    if (!scorers[pi]) scorers[pi] = {name: pl(pi), gPlay:0, gPlaced:0, pPlay:0, pPlaced:0};
    const s = scorers[pi];
    const placed = PLACED_BALL.has(ev.sec);
    if (a === 'Goal')    { placed ? s.gPlaced++ : s.gPlay++; }
    if (a === 'Point')   { placed ? s.pPlaced++ : s.pPlay++; }
    if (a === '2 Point') { placed ? s.pPlaced+=2 : s.pPlay+=2; }
  });
  return Object.values(scorers).sort((a, b) => {
    const ta = (a.gPlay+a.gPlaced)*3 + (a.pPlay+a.pPlaced);
    const tb = (b.gPlay+b.gPlaced)*3 + (b.pPlay+b.pPlaced);
    return tb !== ta ? tb - ta : a.name.localeCompare(b.name);
  });
}

function formatScorer(s) {
  const g = s.gPlay+s.gPlaced, p = s.pPlay+s.pPlaced;
  const total = g*3+p;
  const parts = [];
  if (s.gPlay||s.pPlay)   parts.push((s.gPlay)+'-'+(s.pPlay)+' from play');
  if (s.gPlaced||s.pPlaced) parts.push((s.gPlaced)+'-'+(s.pPlaced)+' from placed balls');
  return esc(s.name)+' <span style="font-weight:600;">'+g+'-'+p+'</span>'
    +' <span style="color:var(--t2);font-size:12px;">('+total+'pts)</span>'
    +(parts.length ? '<br><span style="font-size:11px;color:var(--t2);">'+parts.join(', ')+'</span>' : '');
}

// ─── FULL TIME RESULT ─────────────────────────────────────────────────────────
function showFullTimeResult() {
  const u = state.goals*3+state.pts, o = state.og*3+state.op_;
  const result = u>o?'Win':o>u?'Loss':'Draw';
  const now = new Date();
  const clockStr = pad(now.getHours())+':'+pad(now.getMinutes());
  const desc = 'Match ended at '+clockStr+' — '+state.usN+' '+state.goals+'-'+state.pts+' ('+u+') v '+state.oppN+' '+state.og+'-'+state.op_+' ('+o+') — '+result;
  addRow(fmt(state.secs),'END','bperiod',desc);
  el.mtitle.textContent = 'Full Time';
  el.mopts.innerHTML =
    '<p style="font-size:15px;font-weight:500;color:var(--t1);padding:6px 0 4px;">'+esc(state.usN)+'</p>'
   +'<p style="font-size:32px;font-weight:500;color:var(--t1);padding:0 0 4px;line-height:1;">'+state.goals+'-'+state.pts+' <span style="font-size:16px;color:var(--t2);">('+u+')</span></p>'
   +'<p style="font-size:15px;font-weight:500;color:var(--t1);padding:4px 0;">'+esc(state.oppN)+'</p>'
   +'<p style="font-size:32px;font-weight:500;color:var(--t1);padding:0 0 16px;line-height:1;">'+state.og+'-'+state.op_+' <span style="font-size:16px;color:var(--t2);">('+o+')</span></p>'
   +'<p style="font-size:18px;font-weight:500;padding:0 0 16px;color:'+(result==='Win'?'var(--ts)':result==='Loss'?'var(--td)':'var(--t2)')+';">'+result+'</p>'
   +(()=>{
     const scorers = buildScorerSummary();
     if (!scorers.length) return '';
     return '<div style="border-top:.5px solid var(--b);padding-top:12px;">'
       +'<div style="font-size:10px;font-weight:600;letter-spacing:.07em;color:var(--t2);text-transform:uppercase;margin-bottom:8px;">Scorers</div>'
       +scorers.map(s=>'<div style="display:flex;flex-direction:column;padding:6px 0;border-bottom:.5px solid var(--b);font-size:13px;color:var(--t1);">'+formatScorer(s)+'</div>').join('')
       +'</div>';
   })();
  el.modal.style.display = 'block';
  el.modal.dataset.cancelAction = 'dismiss';
  const cancelBtn = el.modal.querySelector('button[onclick="closeMod()"]');
  if (cancelBtn) cancelBtn.textContent = 'Okay';
  const ub = document.getElementById('undobtn');
  if (ub) {
    ub.id='resetbtn'; ub.disabled=false; ub.classList.remove('danger');
    ub.innerHTML='<i class="fas fa-arrows-rotate" aria-hidden="true"></i>Reset';
    ub.onclick=resetMatch;
  }
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function resetMatch() {
  el.mtitle.textContent = 'Reset match?';
  el.mopts.innerHTML = '<p style="font-size:14px;color:var(--t2);padding:4px 0 14px;line-height:1.5;">All scores, events and cards will be cleared. Team and player settings are kept.</p>'
    +'<button class="abtn" style="color:var(--td);border-color:var(--bd);">Clear everything and reset</button>';
  el.modal.style.display = 'block';
  el.mopts.querySelector('.abtn').addEventListener('click', () => { closeMod(); doReset(); });
}

function doReset() {
  state.goals=0; state.pts=0; state.og=0; state.op_=0;
  el.gc.textContent=0; el.pc.textContent=0; el.og.textContent=0; el.op.textContent=0;
  upTot();
  state.evts=[]; undos=[];
  el.evlog.innerHTML = '<div id="logempty" style="color:var(--t3);font-size:13px;padding:10px 0;">No events recorded yet</div>';
  el.logempty = document.getElementById('logempty');
  syncMeta();
  state.secs=0; state.tStarted=false; state.tStopped=false;
  state.tWallStart=null; state.tPausedAt=0;
  state.matchState='PRE_MATCH';
  stopInterval(); tRun=false;
  state.period=1;
  el['timer-display'].textContent='00:00';
  el['timer-display'].classList.remove('overtime','muted');
  renderTimerUI();
  setGrid(false);
  state.rcarded={}; state.ycarded={}; state.bcarded={};
  state.playerGoals={}; state.playerPts={};
  const sz = state.teamSize || 15;
  for (let s=1; s<=sz; s++) state.slotp[s]=s;
  renderPGrid();
  state.ubench={}; state.suboff={};
  const rb = document.getElementById('resetbtn');
  if (rb) {
    rb.id='undobtn'; rb.classList.add('danger');
    rb.innerHTML='<i class="fas fa-rotate-left" aria-hidden="true"></i>Undo';
    rb.onclick=undoLast; rb.disabled=true;
  }
  refAllBtns();
  clearSavedState();
  toast('Match reset');
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function handleModalClick(e) {
  const btn = e.target.closest('.abtn');
  if (btn && modalHandlerRef) {
    modalHandlerRef(btn.getAttribute('data-v'));
  }
}

const ACTION_GROUPS = [
  {label:'Scores',    items:['Goal','Point','2 Point','Wide']},
  {label:'Discipline',items:['Free','Yellow Card','Black Card','Red Card']},
  {label:'Personnel', items:['Substitution']},
];
const ACTION_META = {
  'Goal':        {cls:'score-btn-goal', icon:'<i class="fas fa-flag fa-beat-fade"></i>'},
  'Point':       {cls:'score-btn-point',icon:'<i class="far fa-flag fa-beat-fade"></i>'},
  '2 Point':     {cls:'score-btn-2p',   icon:'<i class="fas fa-flag fa-beat-fade"></i>'},
  'Wide':        {cls:'action-btn-wide',icon:'<i class="fa-solid fa-child-reaching"></i>'},
  'Free':        {cls:'action-btn-neutral',icon:'<i class="fas fa-whistle"></i>'},
  'Red Card':    {cls:'action-btn-red',   icon:'<i class="fas fa-square" style="color:#E53935;"></i>'},
  'Yellow Card': {cls:'action-btn-yellow',icon:'<i class="fas fa-square" style="color:#FDD835;"></i>'},
  'Black Card':  {cls:'action-btn-black', icon:'<i class="fas fa-square" style="color:#2c2c2a;"></i>'},
  'Substitution':{cls:'action-btn-sub',   icon:'<i class="fas fa-people-arrows"></i>'},
};

function showOpts(title, opts, handler, rich) {
  el.mtitle.textContent = title;
  let html = '';
  if (rich) {
    html += '<div class="opts-grid">';
    opts.forEach(o => html += '<button class="abtn" data-v="'+esc(String(o.val))+'" style="text-align:left;"><div class="sarow"><span style="font-size:15px;color:var(--t1);">'+esc(o.label)+'</span>'+(o.sub?'<span style="font-size:11px;color:var(--t2);">'+esc(o.sub)+'</span>':'')+'</div></button>');
    html += '</div>';
  } else {
    const optsSet = new Set(opts);
    const rendered = new Set();
    ACTION_GROUPS.forEach(group => {
      const groupItems = group.items.filter(i => optsSet.has(i));
      if (!groupItems.length) return;
      html += '<div class="action-group"><div class="action-group-label">'+group.label+'</div><div class="opts-grid">';
      groupItems.forEach(o => {
        rendered.add(o);
        const meta = ACTION_META[o] || {cls:'', icon:''};
        html += '<button class="abtn '+meta.cls+'" data-v="'+esc(o)+'">'+meta.icon+esc(o)+'</button>';
      });
      html += '</div></div>';
    });
    // Fallback for any opts not in groups (e.g. Won/Lost/result screens)
    const ungrouped = opts.filter(o => !rendered.has(o));
    if (ungrouped.length) {
      html += '<div class="opts-grid">';
      ungrouped.forEach(o => {
        let icon = '';
        let btnStyle = '';
        if (o==='Won'||o==='Win')   { icon = '<i class="fas fa-thumbs-up"></i>';   btnStyle = 'background:#2E7D32;color:#fff;border-color:#2E7D32;'; }
        if (o==='Lost'||o==='Loss') { icon = '<i class="fas fa-thumbs-down"></i>'; btnStyle = 'background:#C62828;color:#fff;border-color:#C62828;'; }
        html += '<button class="abtn" data-v="'+esc(o)+'" style="'+btnStyle+'">'+icon+esc(o)+'</button>';
      });
      html += '</div>';
    }
  }
  el.mopts.innerHTML = html;
  el.modal.style.display = 'block';
  modalHandlerRef = (v) => { handler(v); };
  el.mopts.addEventListener('click', handleModalClick);
}

function closeMod() {
  const ca = el.modal.dataset.cancelAction || '';
  el.modal.dataset.cancelAction = '';
  el.modal.style.display = 'none';
  modalHandlerRef = null;
  el.mopts.removeEventListener('click', handleModalClick);
  selSlot=null; pendAct=null; subOff=null;
  // Reset cancel button text
  const cancelBtn = el.modal.querySelector('button[onclick="closeMod()"]');
  if (cancelBtn) cancelBtn.textContent = 'Cancel';
}

// ─── SCORE ADJUST ─────────────────────────────────────────────────────────────
function openScoreModal(side) {
  const isUs = side==='us';
  const name = isUs ? state.usN : state.oppN;
  el.mtitle.textContent = esc(name)+' — adjust score';
  let html = '<div class="action-group"><div class="action-group-label">Scores</div><div class="opts-grid">';
  html += '<button class="abtn score-btn-goal" data-v="g+"><i class="fas fa-flag fa-beat-fade"></i>+ Goal</button>';
  html += '<button class="abtn action-btn-neutral" data-v="g-">− Goal</button>';
  if (state.sport==='football') {
    html += '<button class="abtn score-btn-2p" data-v="f+"><i class="fas fa-flag fa-beat-fade"></i>+ 2 Point</button>';
    html += '<button class="abtn action-btn-neutral" data-v="f-">− 2 Point</button>';
  }
  html += '<button class="abtn score-btn-point" data-v="p+"><i class="far fa-flag fa-beat-fade"></i>+ Point</button>';
  html += '<button class="abtn action-btn-neutral" data-v="p-">− Point</button>';
  html += '<button class="abtn action-btn-wide" data-v="w+" style="grid-column:1 / -1;"><i class="fa-solid fa-child-reaching"></i>Wide</button>';
  html += '</div></div>';
  el.mopts.innerHTML = html;
  el.modal.style.display = 'block';
  modalHandlerRef = (v) => {
    closeMod();
    if (v==='w+') return showRestartModal(side);
    if (v.endsWith('-')) {
      if (v.startsWith('f')) { adjFootball(-2, side, null); }
      else { if (isUs) adjUs(v[0], -1, side, null); else adjOpp(v[0], -1, side, null); }
    } else {
      pendScoreAdj = {type: v[0], d: v.startsWith('f') ? 2 : 1, isFb: v.startsWith('f'), side};
      showScoreHowModal(side);
    }
  };
  el.mopts.addEventListener('click', handleModalClick);
}

function showScoreHowModal(side) {
  const isFb = pendScoreAdj.isFb;
  el.mtitle.textContent = 'How scored?';
  let opts;
  if (isFb) {
    opts = ['From Play', 'From Free'];
  } else {
    const from65label = state.sport==='football' ? 'From 45' : 'From 65';
    opts = ['From Play', 'From Free', from65label, 'From Penalty'];
  }
  let html = '<div class="opts-grid">';
  opts.forEach(o => {
    html += '<button class="abtn" data-v="'+esc(o)+'">'+esc(o)+'</button>';
  });
  html += '</div>';
  el.mopts.innerHTML = html;
  el.modal.style.display = 'block';
  modalHandlerRef = (how) => {
    closeMod();
    completeScoreAdj(how);
  };
  el.mopts.addEventListener('click', handleModalClick);
}

function completeScoreAdj(how) {
  const {type, d, isFb, side} = pendScoreAdj;
  if (isFb) { adjFootball(d, side, how); }
  else { if (side==='us') adjUs(type, d, side, how); else adjOpp(type, d, side, how); }
  pendScoreAdj = null;
}

function adjUs(t, d, side, how) {
  const prev = t==='g' ? state.goals : state.pts;
  const nxt  = Math.max(0, prev+d); if (nxt===prev) return;
  if (t==='g') { state.goals=nxt; el.gc.textContent=state.goals; }
  else          { state.pts=nxt;   el.pc.textContent=state.pts; }
  upTot();
  const type = t==='g'?'Goal':'Point';
  let desc = state.usN+': '+type+' '+(d>0?'added':'removed');
  if (how && d>0) desc += ' · '+how;
  addRow(fmt(state.secs),'ADJ','badj',desc);
  const ct=t,cp=prev;
  pushUndo(desc,()=>{ if(ct==='g'){state.goals=cp;el.gc.textContent=state.goals;}else{state.pts=cp;el.pc.textContent=state.pts;} upTot(); });
  if (d>0) showRestartModal(side||'us');
}

function adjOpp(t, d, side, how) {
  const prev = t==='g' ? state.og : state.op_;
  const nxt  = Math.max(0, prev+d); if (nxt===prev) return;
  let type;
  if (t==='g') { state.og=nxt;  el.og.textContent=state.og;   type='Goal'; }
  else          { state.op_=nxt; el.op.textContent=state.op_;  type='Point'; }
  upTot();
  let desc = state.oppN+': '+type+' '+(nxt>prev?'added':'removed');
  if (how && nxt>prev) desc += ' · '+how;
  addRow(fmt(state.secs),'OPP','bopp',desc);
  const ct=t,cp=prev;
  pushUndo(desc,()=>{ if(ct==='g'){state.og=cp;el.og.textContent=state.og;}else{state.op_=cp;el.op.textContent=state.op_;} upTot(); });
  if (d>0) showRestartModal(side||'opp');
}

function adjFootball(d, side, how) {
  const isUs = side==='us';
  const prev = isUs ? state.pts : state.op_;
  const nxt  = Math.max(0, prev+d); if (nxt===prev) return;
  if (isUs) { state.pts=nxt; el.pc.textContent=state.pts; }
  else      { state.op_=nxt; el.op.textContent=state.op_; }
  upTot();
  const team = isUs ? state.usN : state.oppN;
  let desc = team+': 2 Point '+(d>0?'added':'removed');
  if (how && d>0) desc += ' · '+how;
  addRow(fmt(state.secs),'ADJ','badj',desc);
  const cp=prev;
  pushUndo(desc,()=>{ if(isUs){state.pts=cp;el.pc.textContent=state.pts;}else{state.op_=cp;el.op.textContent=state.op_;} upTot(); });
  if (d>0) showRestartModal(side||'us');
}

// ─── RESTART ──────────────────────────────────────────────────────────────────
function showRestartModal(side) {
  const label = side==='us' ? "Opposition's Restart" : "Own Restart";
  el.mtitle.textContent = 'Restart won?';
  el.mopts.innerHTML = '<div class="opts-grid">'

// ─── EVENT LOG ────────────────────────────────────────────────────────────────
const tail = () => { el.evlog.scrollTop = el.evlog.scrollHeight; };

function addRow(time, badge, cls, desc) {
  state.evts.push({time, badge, cls, desc});
  el.logempty.style.display = 'none';
  const r = document.createElement('div');
  r.className = 'ev-row'+(selMode?' sel-mode':'');
  r.dataset.evIdx = state.evts.length - 1;
  r.innerHTML = '<div class="ev-check"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--ti)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="20 6 9 17 4 12"/></svg></div>'
    +'<span class="ev-time">'+time+'</span>'
    +'<span class="ev-bdg '+cls+'">'+esc(badge)+'</span>'
    +'<span style="color:var(--t1);font-size:13px;flex:1;">'+esc(desc)+'</span>';
  r.addEventListener('click', () => toggleRow(r));
  el.evlog.appendChild(r);
  tail(); syncMeta(); saveState();
}

// ─── UNDO ─────────────────────────────────────────────────────────────────────
function pushUndo(lbl, fn) { undos.push({label:lbl, revert:fn}); syncMeta(); }

function undoLast() {
  if (!undos.length) return;
  const op = undos.pop(); op.revert();
  state.evts.pop();
  if (selMode) {
    selMode = false;
    el.seltoggle.classList.remove('active');
    el.removebar.classList.remove('show');
  }
  const rows = el.evlog.querySelectorAll('.ev-row');
  if (rows.length) rows[rows.length-1].remove();
  if (!state.evts.length) el.logempty.style.display='';
  syncMeta(); saveState(); toast('Undone: '+op.label);
}

// ─── SELECTION ────────────────────────────────────────────────────────────────
function toggleSelMode() {
  selMode = !selMode;
  el.evlog.querySelectorAll('.ev-row').forEach(r => {
    r.classList.toggle('sel-mode', selMode);
    if (!selMode) r.classList.remove('selected');
  });
  el.seltoggle.classList.toggle('active', selMode);
  if (!selMode) el.removebar.classList.remove('show');
  updateRemoveBar();
}

function toggleRow(rowEl) {
  if (!selMode) return;
  rowEl.classList.toggle('selected');
  const chk = rowEl.querySelector('.ev-check svg');
  if (chk) chk.style.display = rowEl.classList.contains('selected') ? 'block' : 'none';
  updateRemoveBar();
}

function updateRemoveBar() {
  const n = el.evlog.querySelectorAll('.ev-row.selected').length;
  el.removelbl.textContent = n+' selected';
  el.removebar.classList.toggle('show', selMode && n>0);
}

function clearSelection() {
  el.evlog.querySelectorAll('.ev-row.selected').forEach(r => {
    r.classList.remove('selected');
    const chk = r.querySelector('.ev-check svg'); if (chk) chk.style.display='none';
  });
  updateRemoveBar();
}

function removeSelected() {
  const rows = Array.from(el.evlog.querySelectorAll('.ev-row'));
  const toRemove = rows.map((r,i) => r.classList.contains('selected')?i:-1).filter(i=>i>=0);
  for (let i=toRemove.length-1; i>=0; i--) { rows[toRemove[i]].remove(); state.evts.splice(toRemove[i],1); }
  undos = [];
  if (!state.evts.length) el.logempty.style.display='';
  selMode=false; el.seltoggle.classList.remove('active'); el.removebar.classList.remove('show');
  syncMeta(); saveState();
  toast('Removed '+toRemove.length+' event'+(toRemove.length!==1?'s':''));
}

// ─── PLAYER ACTIONS ───────────────────────────────────────────────────────────
function sel(s) {
  if (!tRun || state.rcarded[s]) return;
  selSlot = s;
  const acts = state.sport==='football' ? ACTS : ACTS.filter(a => a !== '2 Point');
  showOpts(pl(state.slotp[s])+' — select action', acts, actCb, false);
}

function actCb(a) {
  if (a==='Substitution') { subOff=selSlot; pickSubOn(); return; }
  pendAct = a;
  let sec = NS[a];
  if (sec) {
    // For 2 Point, restrict to From Play and From Free only
    if (a==='2 Point') {
      sec = ['From Play', 'From Free'];
    } else {
      // Convert From 65 to From 45 for Football for other scoring actions
      const from65 = state.sport==='football' ? 'From 45' : 'From 65';
      sec = sec.map(o => o==='From 65' ? from65 : o);
    }
    const titles = {Goal:'Goal — how scored?',Point:'Point — how scored?','2 Point':'2 Point — how scored?',Wide:'Wide — how attempted?',Free:'Free — reason?'};
    showOpts(titles[a], sec, secCb, false);
  } else { logEv(a,null); closeMod(); }
}

function secCb(s) {
  const act = pendAct;
  logEv(pendAct, s);
  closeMod();
  if (act==='Goal'||act==='Point'||act==='2 Point'||act==='Wide') showRestartModal('us');
}

function badgeCls(a) {
  if(a==='Goal')return 'bg'; if(a==='Point')return 'bp'; if(a==='2 Point')return 'bp'; if(a==='Wide')return 'bw';
  if(a==='Red Card')return 'br'; if(a==='Yellow Card')return 'by'; if(a.indexOf('Card')>=0)return 'bc'; return 'bo';
}

function logEv(action, sec) {
  const slot = selSlot, pi = state.slotp[slot];
  const prevG  = state.goals, prevP = state.pts;
  const prevPG = state.playerGoals[pi]||0, prevPP = state.playerPts[pi]||0;

  if (action==='Goal')  { state.goals++; el.gc.textContent=state.goals; state.playerGoals[pi]=prevPG+1; }
  if (action==='Point') { state.pts++;   el.pc.textContent=state.pts;   state.playerPts[pi]=prevPP+1;   }
  if (action==='2 Point') { state.pts+=2; el.pc.textContent=state.pts;   state.playerPts[pi]=prevPP+2;   }
  if (action==='Goal'||action==='Point'||action==='2 Point') { upTot(); refBtn(slot); }

  if (action==='Red Card') {
    state.rcarded[slot]=true;
    const b=document.querySelector('[data-s="'+slot+'"]');
    if(b){ b.classList.remove('hev','sub'); b.classList.add('rc'); const e=document.createElement('span'); e.className='card-r'; b.appendChild(e); }
  }
  if (action==='Yellow Card') {
    state.ycarded[slot]=(state.ycarded[slot]||0)+1;
    const b=document.querySelector('[data-s="'+slot+'"]');
    if(b&&!b.querySelector('.card-y')){ const e=document.createElement('span'); e.className='card-y'; b.appendChild(e); }
  }
  if (action==='Black Card') {
    state.bcarded[slot]=(state.bcarded[slot]||0)+1;
    const b=document.querySelector('[data-s="'+slot+'"]');
    if(b&&!b.querySelector('.card-b')){ const e=document.createElement('span'); e.className='card-b'; b.appendChild(e); }
  }

  const desc = pl(pi)+': '+action+(sec?' · '+sec:'');
  if (action!=='Red Card') {
    const b=document.querySelector('[data-s="'+slot+'"]');
    if(b&&!b.classList.contains('rc')) b.classList.add('hev');
  }
  addRow(fmt(state.secs), gi(pi), badgeCls(action), desc);
  // Tag the event with slot/action/sec for accurate undo hev check and scorer summary
  const ev = state.evts[state.evts.length-1];
  ev.slot=slot; ev.action=action; ev.sec=sec||null;

  pushUndo(desc, () => {
    if (action==='Goal')  { state.goals=prevG; el.gc.textContent=state.goals; state.playerGoals[pi]=prevPG; upTot(); refBtn(slot); }
    if (action==='Point') { state.pts=prevP;   el.pc.textContent=state.pts;   state.playerPts[pi]=prevPP;   upTot(); refBtn(slot); }
    if (action==='2 Point') { state.pts=prevP;   el.pc.textContent=state.pts;   state.playerPts[pi]=prevPP;   upTot(); refBtn(slot); }
    if (action==='Red Card') {
      delete state.rcarded[slot];
      const b=document.querySelector('[data-s="'+slot+'"]');
      if(b){ b.classList.remove('rc'); const c=b.querySelector('.card-r'); if(c)c.remove(); }
    }
    if (action==='Yellow Card') {
      state.ycarded[slot]=(state.ycarded[slot]||1)-1;
      if(state.ycarded[slot]<=0){ delete state.ycarded[slot]; const b=document.querySelector('[data-s="'+slot+'"]'); const c=b&&b.querySelector('.card-y'); if(c)c.remove(); }
    }
    if (action==='Black Card') {
      state.bcarded[slot]=(state.bcarded[slot]||1)-1;
      if(state.bcarded[slot]<=0){ delete state.bcarded[slot]; const b=document.querySelector('[data-s="'+slot+'"]'); const c=b&&b.querySelector('.card-b'); if(c)c.remove(); }
    }
    const b2=document.querySelector('[data-s="'+slot+'"]');
    const still=state.evts.some(e=>e.slot===slot);
    if(b2){ if(still)b2.classList.add('hev'); else b2.classList.remove('hev'); }
  });
}

// ─── SUBSTITUTION ─────────────────────────────────────────────────────────────
function pickSubOn() {
  const used={};
  const sz=state.teamSize||15; for (let s=1; s<=sz; s++) used[state.slotp[s]]=true;
  const isGK = subOff===1, avail=[];
  for (let idx=16; idx<=state.maxB+5; idx++) {
    if(used[idx])continue;
    const n=gn(idx); if(!n&&idx>state.maxB)continue;
    const gks=idx===16; if(isGK&&!gks)continue; if(!isGK&&gks)continue;
    avail.push({val:String(idx),label:(n||'#'+idx),sub:gks?'Sub GK':'Outfield sub'});
  }
  for (let pidx in state.suboff) {
    pidx=parseInt(pidx); if(used[pidx])continue;
    if(isGK!==(state.suboff[pidx]===1))continue;
    if(state.rcarded[state.suboff[pidx]])continue;
    avail.push({val:String(pidx),label:(gn(pidx)||'#'+pidx),sub:'Previously subbed off'});
  }
  if (!avail.length) {
    el.mtitle.textContent='No subs available';
    el.mopts.innerHTML='<p style="color:var(--t2);font-size:14px;padding:8px 0 4px;">No players available.</p>';
    return;
  }
  showOpts('Who comes on?', avail, v => execSub(parseInt(v)), true);
}

function execSub(bi) {
  const sl=subOff, out=state.slotp[sl];
  state.suboff[out]=sl; state.slotp[sl]=bi; state.ubench[bi]=true;
  if(state.suboff[bi])delete state.suboff[bi];
  const desc='Sub: '+pl(out)+' off / '+pl(bi)+' on (pos '+sl+')';
  const btn=document.querySelector('[data-s="'+sl+'"]'); if(btn)btn.classList.add('sub');
  addRow(fmt(state.secs),'SUB','bs',desc);
  const ev=state.evts[state.evts.length-1]; ev.slot=sl; ev.action='sub';
  const cs=sl,co=out,ci=bi;
  pushUndo(desc,()=>{
    state.slotp[cs]=co; delete state.suboff[co]; delete state.ubench[ci]; state.suboff[ci]=cs;
    const b2=document.querySelector('[data-s="'+cs+'"]');
    if(b2){ b2.classList.remove('sub'); if(state.ubench[co])b2.classList.add('sub'); }
    refBtn(cs);
  });
  refBtn(sl); closeMod();
}

// ─── SHARE ────────────────────────────────────────────────────────────────────
function shareWA() {
  const u=state.goals*3+state.pts, o=state.og*3+state.op_;
  const lines=['*'+state.usN+': '+state.goals+'-'+state.pts+' ('+u+') v '+state.oppN+': '+state.og+'-'+state.op_+' ('+o+')*','*Time: '+fmt(state.secs)+'*',''];
  state.evts.forEach(e => lines.push(e.time+'  '+e.desc));
  window.open('https://wa.me/?text='+encodeURIComponent(lines.join('\n')),'_blank');
}

// ─── TEMPLATES ────────────────────────────────────────────────────────────────
function saveTpl() {
  const name = el.tni.value.trim(); if(!name){toast('Enter a template name');return;}
  const data = {usName:el.sun.value.trim()||state.usN, playerNames:{}, captain:state.captain};
  for(let i=1;i<=state.maxB+2;i++){const inp=document.getElementById('sn'+i);if(inp&&inp.value.trim())data.playerNames[i]=inp.value.trim();}
  try{localStorage.setItem('tpl:'+name,JSON.stringify(data));toast('Saved "'+name+'"');el.tni.value='';renderTpls();}catch(e){toast('Save failed');}
}

function loadTpl(name) {
  try{
    const raw=localStorage.getItem('tpl:'+name); if(!raw)return;
    const data=JSON.parse(raw);
    if(data.usName)el.sun.value=data.usName;
    state.maxB=17; // reset so stale slots don't accumulate
    if(data.playerNames){
      for(let i=1;i<=30;i++){
        const inp=document.getElementById('sn'+i); if(inp)inp.value=data.playerNames[i]||'';
        if(data.playerNames[i]&&i>=state.maxB)state.maxB=i+1;
      }
    }
    if('captain' in data) {
      state.captain = data.captain;
      document.querySelectorAll('.cap-btn').forEach(b => {
        const s = parseInt(b.dataset.cap);
        const isCap = state.captain === s;
        b.className = 'cap-btn ' + (isCap ? 'active' : 'inactive');
        b.querySelector('i').className = 'fa-regular ' + (isCap ? 'fa-copyright' : 'fa-circle');
      });
    }
    toast('Loaded "'+name+'"');
  }catch(e){toast('Load failed');}
}

function delTpl(name){try{localStorage.removeItem('tpl:'+name);renderTpls();toast('Deleted');}catch(e){}}

function renderTpls(){
  const keys=[];
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('tpl:'))keys.push(k);}
  if(!keys.length){el.tpllist.innerHTML='<div style="font-size:13px;color:var(--t3);padding:4px 0;">No saved templates</div>';return;}
  el.tpllist.innerHTML=keys.map(k=>{
    const n=k.replace('tpl:','');
    return '<div class="tplrow"><span style="flex:1;font-size:14px;">'+esc(n)+'</span><button class="tplbtn load" onclick="loadTpl(\''+esc(n)+'\')">Load</button><button class="tplbtn del" onclick="delTpl(\''+esc(n)+'\')">Delete</button></div>';
  }).join('');
}

// ─── RESTORE UI FROM PERSISTED STATE ─────────────────────────────────────────
function restoreUI() {
  el.gc.textContent=state.goals; el.pc.textContent=state.pts;
  el.og.textContent=state.og;    el.op.textContent=state.op_;
  upTot();
  el.uslbl.textContent=state.usN.toUpperCase();
  el.opplbl.textContent=state.oppN.toUpperCase();
  // Backwards compat: derive matchState from legacy flags if not in saved data
  if (!state.matchState || state.matchState === 'PRE_MATCH') {
    const lastBadge = state.evts.length ? state.evts[state.evts.length-1].badge : null;
    if (lastBadge === 'END') {
      state.matchState = 'FULL_TIME';
    } else if ((state.tStarted || state.tStopped) && state.period >= 2) {
      state.matchState = 'PAUSED_SECOND_HALF';
    } else if ((state.tStarted || state.tStopped) && state.period === 1) {
      state.matchState = 'PAUSED_FIRST_HALF';
    } else if (state.period >= 2 && !state.tStarted && !state.tStopped) {
      state.matchState = 'HALF_TIME';
    }
  }
  // If running state was saved, compute true elapsed and restore as paused
  if (state.matchState === 'RUNNING_FIRST_HALF' || state.matchState === 'RUNNING_SECOND_HALF') {
    if (state.tWallStart) {
      const trueElapsed = Math.floor((Date.now() - state.tWallStart) / 1000);
      state.secs = trueElapsed;
      state.tPausedAt = trueElapsed;
    } else {
      state.tPausedAt = state.secs;
    }
    state.matchState = state.matchState === 'RUNNING_FIRST_HALF' ? 'PAUSED_FIRST_HALF' : 'PAUSED_SECOND_HALF';
    state.tWallStart = null;
  }
  el['timer-display'].textContent=fmt(state.secs);
  if(state.secs>=1800) el['timer-display'].classList.add('overtime');
  renderTimerUI();
  // Show the full-time result modal on restore if match ended
  if (state.matchState === 'FULL_TIME') {
    const ub = document.getElementById('undobtn');
    if (ub && ub.id === 'undobtn') {
      ub.id='resetbtn'; ub.disabled=false; ub.classList.remove('danger');
      ub.innerHTML='<i class="fas fa-arrows-rotate" aria-hidden="true"></i>Reset';
      ub.onclick=resetMatch;
    }
  }
  // Rebuild event log DOM from stored events
  state.evts.forEach(e => {
    const r=document.createElement('div'); r.className='ev-row';
    r.innerHTML='<div class="ev-check"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--ti)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="20 6 9 17 4 12"/></svg></div>'
      +'<span class="ev-time">'+e.time+'</span>'
      +'<span class="ev-bdg '+(e.cls||'bo')+'">'+esc(e.badge||'')+'</span>'
      +'<span style="color:var(--t1);font-size:13px;flex:1;">'+esc(e.desc||'')+'</span>';
    r.addEventListener('click',()=>toggleRow(r));
    el.evlog.appendChild(r);
  });
  if(state.evts.length) el.logempty.style.display='none';
  // Apply slot/card/sub classes
  const slotsWithEvts=new Set(state.evts.filter(e=>e.slot&&e.action&&e.action!=='sub').map(e=>e.slot));
  const teamSz=state.teamSize||15;
  for(let s=1;s<=teamSz;s++){
    const b=document.querySelector('[data-s="'+s+'"]'); if(!b) continue;
    if(state.rcarded[s])        b.classList.add('rc');
    else if(slotsWithEvts.has(s)) b.classList.add('hev');
    if(state.ubench[state.slotp[s]]) b.classList.add('sub');
  }
  buildInitialsCache();
  refAllBtns();
  syncMeta();
}

}
