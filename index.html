<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GAA Match Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1efe8;display:flex;justify-content:center;}
:root{
  --bg1:#fff;--bg2:#f1efe8;--bg3:#e8e6df;
  --bgi:#e6f1fb;--bgd:#fcebeb;--bgs:#eaf3de;--bgw:#faeeda;
  --t1:#1a1a18;--t2:#5f5e5a;--t3:#888780;
  --ti:#0c447c;--td:#a32d2d;--ts:#3b6d11;--tw:#854f0b;
  --b:rgba(0,0,0,0.12);--bm:rgba(0,0,0,0.22);
  --bi:#378add;--bd:#e24b4a;--bs:#639922;--bw:#ef9f27;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){
  body{background:#1a1a18;}
  :root{
    --bg1:#2c2c2a;--bg2:#222220;--bg3:#1a1a18;
    --bgi:#042c53;--bgd:#501313;--bgs:#173404;--bgw:#412402;
    --t1:#f0ede6;--t2:#b4b2a9;--t3:#888780;
    --ti:#85b7eb;--td:#f09595;--ts:#97c459;--tw:#ef9f27;
    --b:rgba(255,255,255,0.1);--bm:rgba(255,255,255,0.2);
  }
}
#app{width:100%;max-width:460px;height:100%;display:flex;flex-direction:column;position:relative;color:var(--t1);}
.scroll{flex:1;overflow-y:auto;padding:10px 10px 0;}
.timer-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg2);border-radius:var(--rl);margin-bottom:10px;}
#timer-display{font-size:44px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-1.5px;line-height:1;flex-shrink:0;color:var(--t1);}
.timer-btns{display:flex;gap:8px;flex:1;justify-content:flex-end;align-items:center;}
.t-btn{padding:9px 16px;border-radius:999px;font-size:14px;font-weight:500;cursor:pointer;border-width:1px;border-style:solid;font-family:inherit;touch-action:manipulation;white-space:nowrap;}
.scoreboard{background:var(--bg1);border-radius:18px;margin-bottom:10px;overflow:hidden;border:1.5px solid var(--bm);box-shadow:0 3px 16px rgba(0,0,0,0.13);}
.score-inner{display:flex;align-items:stretch;padding:8px 6px 6px;}
.team-lbl{font-size:10px;font-weight:500;letter-spacing:.05em;color:var(--t2);text-align:center;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.div-v{width:.5px;background:var(--b);align-self:stretch;margin:0 4px;flex-shrink:0;}
.p-row{display:flex;gap:10px;justify-content:center;margin-bottom:10px;}
.pbtn{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.92);color:#1a1a18;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;touch-action:manipulation;transition:transform .1s,background .15s;line-height:1.1;text-align:center;padding:2px;position:relative;font-family:inherit;}
.pbtn:active{transform:scale(.91);}
.pbtn.hev{background:rgba(180,212,244,0.95);color:#0c447c;border-color:rgba(55,138,221,0.8);}
.pbtn.rc{background:rgba(252,235,235,0.92)!important;color:#a32d2d!important;border-color:rgba(226,75,74,0.7)!important;opacity:.55!important;cursor:not-allowed!important;pointer-events:none!important;}
.pbtn.sub{border-style:dashed;}
.subdot{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;background:#25D366;border:1px solid rgba(255,255,255,0.8);}
.card-y{position:absolute;top:3px;left:3px;width:5px;height:8px;border-radius:1.5px;background:#f5c242;border:.5px solid rgba(0,0,0,0.25);}
.card-b{position:absolute;top:3px;left:10px;width:5px;height:8px;border-radius:1.5px;background:#2c2c2a;border:.5px solid rgba(255,255,255,0.2);}
.card-r{position:absolute;top:3px;left:3px;width:5px;height:8px;border-radius:1.5px;background:#e24b4a;border:.5px solid rgba(0,0,0,0.25);}
.bot-bar{display:flex;align-items:stretch;border-top:.5px solid var(--bm);background:var(--bg1);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
.bar-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;cursor:pointer;border:none;background:none;color:var(--t2);font-size:10px;font-weight:500;letter-spacing:.04em;touch-action:manipulation;font-family:inherit;}
.bar-btn:active{background:var(--bg2);}
.bar-btn.danger{color:var(--td);}
.bar-btn:disabled{opacity:.3;cursor:default;}
.bar-div{width:.5px;background:var(--b);align-self:stretch;margin:8px 0;}
.overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.48);z-index:50;padding:44px 12px 12px;}
.modal-box{background:var(--bg1);border-radius:var(--rl);border:.5px solid var(--b);padding:14px;max-height:82vh;overflow-y:auto;}
.full-panel{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg1);z-index:60;padding:14px;flex-direction:column;}
.full-panel.open{display:flex;}
.panel-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-shrink:0;}
.back-btn{width:36px;height:36px;border-radius:50%;border:.5px solid var(--bm);background:var(--bg1);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;}
.back-btn:active{background:var(--bg2);}
.abtn{display:block;width:100%;padding:14px;margin-bottom:0;text-align:center;background:var(--bg1);border:.5px solid var(--b);border-radius:var(--r);color:var(--t1);font-size:15px;cursor:pointer;font-family:inherit;}
.abtn:active{background:var(--bg2);}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ev-row{display:flex;gap:10px;padding:7px 0;border-bottom:.5px solid var(--b);font-size:13px;align-items:flex-start;cursor:default;transition:background .1s;}
.ev-row:last-child{border-bottom:none;}
.ev-row.selected{background:var(--bgi);}
.ev-row.sel-mode{cursor:pointer;}
.ev-row.sel-mode:active{background:var(--bg2);}
.ev-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--bm);background:var(--bg1);flex-shrink:0;display:none;align-items:center;justify-content:center;margin-top:1px;}
.ev-row.sel-mode .ev-check{display:flex;}
.ev-row.selected .ev-check{background:var(--bgi);border-color:var(--bi);}
.ev-time{color:var(--t2);min-width:40px;flex-shrink:0;}
.ev-bdg{font-size:11px;padding:2px 6px;border-radius:999px;font-weight:500;flex-shrink:0;}
.remove-bar{display:none;align-items:center;justify-content:space-between;padding:10px 13px;border-top:.5px solid var(--b);background:var(--bgd);gap:10px;}
.remove-bar.show{display:flex;}
.remove-bar-label{font-size:13px;color:var(--td);font-weight:500;}
.remove-bar-btn{padding:7px 16px;border-radius:999px;background:var(--td);color:#fff;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;touch-action:manipulation;}
.remove-bar-btn:active{opacity:.85;}
.sel-toggle{padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;border:.5px solid var(--bm);background:none;color:var(--t2);font-family:inherit;touch-action:manipulation;}
.sel-toggle.active{background:var(--bgi);color:var(--ti);border-color:var(--bi);}
.bg{background:var(--bgd);color:var(--td);}
.bp{background:var(--bgs);color:var(--ts);}
.bw{background:var(--bgw);color:var(--tw);}
.bc{background:var(--bgi);color:var(--ti);}
.br{background:var(--bgd);color:var(--td);}
.bs{background:#e8f8ed;color:#1a7a3c;}
.bo,.badj{background:var(--bg2);color:var(--t2);}
.bopp{background:var(--bgw);color:var(--tw);}
.brstr{background:#e1f5ee;color:#0f6e56;}
.bperiod{background:var(--bgi);color:var(--ti);}
.sinput{width:100%;padding:9px 11px;border:.5px solid var(--bm);border-radius:var(--r);background:var(--bg1);color:var(--t1);font-size:14px;font-family:inherit;}
.sinput:focus{outline:none;border-color:var(--bi);}
.prow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid var(--b);}
.prow:last-child{border-bottom:none;}
.pbadge{width:32px;height:32px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--bm);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--t2);}
.pbadge.gk{border-color:var(--bw);color:var(--tw);background:var(--bgw);}
.pbadge.sub{border-color:#25D366;color:#1a7a3c;background:#e8f8ed;}
.stitle{font-size:11px;font-weight:500;color:var(--t2);letter-spacing:.06em;margin:14px 0 7px;}
.tplrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--b);}
.tplrow:last-child{border-bottom:none;}
.tplbtn{padding:5px 12px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;border:.5px solid var(--bm);background:var(--bg1);color:var(--t1);font-family:inherit;}
.tplbtn.load{border-color:var(--bi);color:var(--ti);}
.tplbtn.del{border-color:var(--bd);color:var(--td);}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px 14px;background:#25D366;color:#fff;border:none;border-radius:0 0 var(--rl) var(--rl);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;}
.wa-btn:active{opacity:.85;}
.toast{position:absolute;bottom:72px;left:50%;transform:translateX(-50%);background:var(--t1);color:var(--bg1);padding:8px 18px;border-radius:999px;font-size:13px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;}
.toast.show{opacity:1;}
.sarow{display:flex;flex-direction:column;gap:2px;}
.score-adj-btn{width:52px;height:52px;border-radius:12px;border:1.5px solid var(--bm);background:var(--bg1);color:var(--t2);font-size:17px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;font-family:inherit;line-height:1;}
.score-adj-btn:active{background:var(--bg2);transform:scale(.93);}
@keyframes flash-red{0%,100%{opacity:1}50%{opacity:.2}}
.overtime{animation:flash-red 1s ease-in-out infinite;color:#E24B4A;}
</style>
</head>
<body>
<div id="app">
  <div class="toast" id="toast"></div>
  <div class="scroll">
    <!-- Timer row -->
    <div class="timer-row">
      <div id="timer-display">00:00</div>
      <div class="timer-btns">
        <button id="tbtn" class="t-btn" onclick="timerMain()" style="background:var(--bgs);color:var(--ts);border-color:var(--bs);">Start</button>
        <button id="stopbtn" class="t-btn" onclick="stopTimer()" style="display:none;background:var(--bgd);color:var(--td);border-color:var(--bd);">Stop</button>
      </div>
    </div>
    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="score-inner" style="align-items:center;gap:8px;padding:10px 8px 10px;">
        <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-start;flex:1;min-width:0;">
          <div id="uslbl" class="team-lbl" style="padding-left:2px;">DONAGHMORE/ASHBOURNE</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <button class="score-adj-btn" onclick="openScoreModal('us')">+/−</button>
            <div style="display:flex;align-items:baseline;gap:5px;flex-wrap:nowrap;">
              <span id="gc" style="font-size:28px;font-weight:500;color:var(--td);line-height:1;">0</span>
              <span style="font-size:20px;font-weight:300;color:var(--t3);line-height:1;">—</span>
              <span id="pc" style="font-size:28px;font-weight:500;color:var(--ts);line-height:1;">0</span>
              <span id="utotal" style="font-size:14px;font-weight:500;color:var(--t2);line-height:1;">(0)</span>
            </div>
          </div>
        </div>
        <div class="div-v" style="height:52px;margin:0;"></div>
        <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex:1;min-width:0;">
          <div id="opplbl" class="team-lbl" style="padding-right:2px;">OPPOSITION</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="display:flex;align-items:baseline;gap:5px;flex-wrap:nowrap;">
              <span id="ototal" style="font-size:14px;font-weight:500;color:var(--t2);line-height:1;">(0)</span>
              <span id="og" style="font-size:28px;font-weight:500;color:var(--td);line-height:1;">0</span>
              <span style="font-size:20px;font-weight:300;color:var(--t3);line-height:1;">—</span>
              <span id="op" style="font-size:28px;font-weight:500;color:var(--ts);line-height:1;">0</span>
            </div>
            <button class="score-adj-btn" onclick="openScoreModal('opp')">+/−</button>
          </div>
        </div>
      </div>
    </div>
    <!-- Player grid with pitch -->
    <div style="position:relative;margin-bottom:8px;">
      <svg viewBox="0 0 320 400" xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;" preserveAspectRatio="xMidYMid slice">
        <rect width="320" height="400" fill="#4a9a38" rx="10"/>
        <rect x="0" y="10"  width="320" height="44" fill="#52a83f" opacity="0.5"/>
        <rect x="0" y="98"  width="320" height="44" fill="#52a83f" opacity="0.5"/>
        <rect x="0" y="186" width="320" height="28" fill="#52a83f" opacity="0.5"/>
        <rect x="0" y="258" width="320" height="44" fill="#52a83f" opacity="0.5"/>
        <rect x="0" y="346" width="320" height="44" fill="#52a83f" opacity="0.5"/>
        <rect x="10" y="10" width="300" height="380" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
        <line x1="10" y1="132" x2="310" y2="132" stroke="rgba(255,255,255,0.55)" stroke-width="1.4"/>
        <line x1="10" y1="268" x2="310" y2="268" stroke="rgba(255,255,255,0.55)" stroke-width="1.4"/>
        <line x1="10" y1="64"  x2="310" y2="64"  stroke="rgba(255,255,255,0.65)" stroke-width="1.6"/>
        <line x1="10" y1="336" x2="310" y2="336" stroke="rgba(255,255,255,0.65)" stroke-width="1.6"/>
        <line x1="10" y1="45"  x2="310" y2="45"  stroke="rgba(255,255,255,0.5)"  stroke-width="1.3"/>
        <line x1="10" y1="355" x2="310" y2="355" stroke="rgba(255,255,255,0.5)"  stroke-width="1.3"/>
        <line x1="10" y1="200" x2="310" y2="200" stroke="rgba(255,255,255,0.65)" stroke-width="1.6" stroke-dasharray="12 7"/>
        <circle cx="160" cy="200" r="2.5" fill="rgba(255,255,255,0.6)"/>
        <rect x="127" y="10"  width="66" height="35" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.6"/>
        <rect x="127" y="355" width="66" height="35" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.6"/>
        <rect x="135" y="10"  width="50" height="12" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.6"/>
        <rect x="135" y="378" width="50" height="12" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.6"/>
        <path d="M 114,64 A 46,35 0 0,0 206,64"  fill="none" stroke="rgba(255,255,255,0.7)"  stroke-width="1.5"/>
        <path d="M 114,336 A 46,35 0 0,1 206,336" fill="none" stroke="rgba(255,255,255,0.7)"  stroke-width="1.5"/>
        <path d="M 38,64 A 141,108 0 0,0 282,64"  fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.4"/>
        <path d="M 38,336 A 141,108 0 0,1 282,336" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.4"/>
        <circle cx="160" cy="40"  r="2.5" fill="rgba(255,255,255,0.6)"/>
        <circle cx="160" cy="360" r="2.5" fill="rgba(255,255,255,0.6)"/>
        <line x1="149" y1="0"   x2="149" y2="12"  stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
        <line x1="171" y1="0"   x2="171" y2="12"  stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
        <line x1="147" y1="3"   x2="173" y2="3"   stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
        <line x1="149" y1="388" x2="149" y2="400" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
        <line x1="171" y1="388" x2="171" y2="400" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
        <line x1="147" y1="397" x2="173" y2="397" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
      </svg>
      <div id="pgrid" style="position:relative;z-index:1;opacity:.3;pointer-events:none;transition:opacity .2s;padding:10px 0 10px;">
        <div class="p-row"><button class="pbtn" data-s="1"  onclick="sel(1)">1</button></div>
        <div class="p-row"><button class="pbtn" data-s="2"  onclick="sel(2)">2</button><button class="pbtn" data-s="3"  onclick="sel(3)">3</button><button class="pbtn" data-s="4"  onclick="sel(4)">4</button></div>
        <div class="p-row"><button class="pbtn" data-s="5"  onclick="sel(5)">5</button><button class="pbtn" data-s="6"  onclick="sel(6)">6</button><button class="pbtn" data-s="7"  onclick="sel(7)">7</button></div>
        <div class="p-row"><button class="pbtn" data-s="8"  onclick="sel(8)">8</button><button class="pbtn" data-s="9"  onclick="sel(9)">9</button></div>
        <div class="p-row"><button class="pbtn" data-s="10" onclick="sel(10)">10</button><button class="pbtn" data-s="11" onclick="sel(11)">11</button><button class="pbtn" data-s="12" onclick="sel(12)">12</button></div>
        <div class="p-row"><button class="pbtn" data-s="13" onclick="sel(13)">13</button><button class="pbtn" data-s="14" onclick="sel(14)">14</button><button class="pbtn" data-s="15" onclick="sel(15)">15</button></div>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bot-bar">
    <button class="bar-btn" onclick="openSettings()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Setup
    </button>
    <div class="bar-div"></div>
    <button class="bar-btn" onclick="openLog()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Log<span id="lbdg" style="display:none;font-size:9px;background:var(--bgi);color:var(--ti);border-radius:999px;padding:1px 5px;margin-left:3px;vertical-align:middle;"></span>
    </button>
    <div class="bar-div"></div>
    <button class="bar-btn danger" id="undobtn" onclick="undoLast()" disabled>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
      Undo
    </button>
  </div>

  <!-- Modal -->
  <div id="modal" class="overlay">
    <div class="modal-box">
      <div id="mtitle" style="font-size:14px;font-weight:500;color:var(--t2);margin-bottom:11px;padding-bottom:9px;border-bottom:.5px solid var(--b);"></div>
      <div id="mopts"></div>
      <button onclick="closeMod()" style="display:block;width:100%;padding:13px;border-radius:var(--r);background:none;border:.5px solid var(--bm);color:var(--t2);font-size:14px;cursor:pointer;margin-top:8px;font-family:inherit;">Cancel</button>
    </div>
  </div>

  <!-- Log panel -->
  <div id="logpanel" class="full-panel">
    <div class="panel-hdr">
      <button class="back-btn" onclick="closeLog()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div style="font-size:17px;font-weight:500;flex:1;">Event log</div>
      <span id="lcnt" style="font-size:12px;color:var(--t3);margin-right:8px;">0 events</span>
      <button id="seltoggle" class="sel-toggle" onclick="toggleSelMode()">Select</button>
    </div>
    <div style="flex:1;min-height:0;border:.5px solid var(--b);border-radius:var(--rl);overflow:hidden;display:flex;flex-direction:column;">
      <div id="evlog" style="padding:4px 13px;overflow-y:auto;flex:1;">
        <div id="logempty" style="color:var(--t3);font-size:13px;padding:10px 0;">No events recorded yet</div>
      </div>
      <div id="removebar" class="remove-bar">
        <span id="removelbl" class="remove-bar-label">0 selected</span>
        <div style="display:flex;gap:8px;">
          <button onclick="clearSelection()" style="padding:7px 14px;border-radius:999px;background:none;color:var(--td);border:1px solid var(--bd);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;">Clear</button>
          <button class="remove-bar-btn" onclick="removeSelected()">Remove</button>
        </div>
      </div>
      <div style="border-top:.5px solid var(--b);flex-shrink:0;">
        <button class="wa-btn" onclick="shareWA()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Share via WhatsApp
        </button>
      </div>
    </div>
  </div>

  <!-- Settings panel -->
  <div id="setpanel" class="full-panel">
    <div class="panel-hdr">
      <button class="back-btn" onclick="closeSettings()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div style="font-size:17px;font-weight:500;flex:1;">Setup</div>
      <button onclick="saveSettings()" style="padding:7px 18px;border-radius:999px;background:var(--bgi);color:var(--ti);border:.5px solid var(--bi);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;">Save</button>
    </div>
    <div style="flex:1;overflow-y:auto;">
      <div class="stitle">TEAM NAMES</div>
      <div style="display:flex;gap:8px;">
        <div style="flex:1;"><div style="font-size:12px;color:var(--t2);margin-bottom:4px;">Us</div><input class="sinput" id="sun" type="text" placeholder="e.g. Kilkenny" maxlength="24"></div>
        <div style="flex:1;"><div style="font-size:12px;color:var(--t2);margin-bottom:4px;">Opposition</div><input class="sinput" id="son" type="text" placeholder="e.g. Tipperary" maxlength="24"></div>
      </div>
      <div class="stitle">TEMPLATES</div>
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <input class="sinput" id="tni" type="text" placeholder="Template name" maxlength="30" style="flex:1;">
        <button onclick="saveTpl()" style="padding:9px 14px;border-radius:var(--r);background:var(--bgs);color:var(--ts);border:.5px solid var(--bs);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit;">Save squad</button>
      </div>
      <div id="tpllist"><div style="font-size:13px;color:var(--t3);padding:4px 0;">No saved templates</div></div>
      <div class="stitle">STARTING XV</div>
      <div id="pslist"></div>
      <div class="stitle">BENCH</div>
      <div id="bslist"></div>
    </div>
  </div>
</div>

<script>
'use strict';

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const ACTS  = ['Goal','Point','Wide','Free','Red Card','Yellow Card','Black Card','Substitution'];
const SSEC  = ['From Play','From Free','From Penalty','From 65'];
const FSEC  = ['Push','Chop','Steps','Tackle','Pickup'];
const NS    = {Goal:SSEC,Point:SSEC,Wide:SSEC,Free:FSEC};
const SAVE_KEY = 'gaa_match_v1';
const DEFAULT_US = 'Donaghmore/Ashbourne';

// ─── STATE (single source of truth) ──────────────────────────────────────────
const state = {
  goals:0, pts:0, og:0, op_:0,
  period:1, secs:0,
  tStarted:false, tStopped:false,
  tWallStart:null, tPausedAt:0,
  usN:DEFAULT_US, oppN:'Opposition',
  pnames:{}, slotp:{}, ubench:{}, suboff:{},
  rcarded:{}, ycarded:{}, bcarded:{},
  playerGoals:{}, playerPts:{},
  maxB:17,
  evts:[],   // {time, desc, badge, cls, slot?, action?}
};
for (let i = 1; i <= 15; i++) state.slotp[i] = i;

// ─── SESSION STATE (not persisted) ────────────────────────────────────────────
let undos   = [];
let selMode = false;
let selSlot = null, pendAct = null, subOff = null;
let tInt    = null;
let tRun    = false;
let initialsCache = {};

// ─── DOM CACHE ────────────────────────────────────────────────────────────────
const el = {};
function initEl() {
  ['timer-display','gc','pc','og','op','utotal','ototal','uslbl','opplbl',
   'evlog','logempty','lcnt','lbdg','toast','modal','mtitle','mopts',
   'tbtn','stopbtn','pgrid','logpanel','setpanel','seltoggle',
   'removebar','removelbl','sun','son','pslist','bslist','tpllist','tni'
  ].forEach(id => { el[id] = document.getElementById(id); });
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');
const fmt = s => pad(Math.floor(s/60))+':'+pad(s%60);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const gn  = i => (state.pnames[i]||'').trim();
const pl  = i => { const n=gn(i); return n ? esc(n)+' (#'+i+')' : '#'+i; };

// ─── INITIALS CACHE ───────────────────────────────────────────────────────────
function buildInitialsCache() {
  initialsCache = {};
  const all = Object.keys(state.pnames).map(Number);
  all.forEach(i => { initialsCache[i] = computeInitials(i, all); });
}

function computeInitials(i, all) {
  const nm = gn(i); if (!nm) return String(i);
  const p = nm.split(/\s+/), fi = p[0][0].toUpperCase();
  if (p.length === 1) return fi;
  const surname = p[p.length-1];
  let surnameKey = '', hasO = false;
  if (/^[OÓ]'/i.test(surname)) {
    surnameKey = surname[0].toUpperCase() + surname.substring(2).toUpperCase(); hasO = true;
  } else if (p.length >= 3 && /^[OÓ]$/i.test(p[p.length-2])) {
    surnameKey = p[p.length-2].toUpperCase() + surname.toUpperCase(); hasO = true;
  } else {
    surnameKey = surname.toUpperCase();
  }
  const minEx = hasO && surnameKey.length >= 2 ? 2 : 1;
  for (let ex = 1; ex <= surnameKey.length; ex++) {
    const c = fi + surnameKey.substring(0, ex);
    let clash = false;
    for (const oi of all) {
      if (oi === i) continue;
      const on = gn(oi); if (!on) continue;
      const op2 = on.split(/\s+/); if (op2.length < 2) continue;
      const oSn = op2[op2.length-1];
      let oKey = '';
      if (/^[OÓ]'/i.test(oSn)) oKey = oSn[0].toUpperCase()+oSn.substring(2).toUpperCase();
      else if (op2.length>=3 && /^[OÓ]$/i.test(op2[op2.length-2])) oKey = op2[op2.length-2].toUpperCase()+oSn.toUpperCase();
      else oKey = oSn.toUpperCase();
      if (op2[0][0].toUpperCase()+oKey.substring(0,ex) === c) { clash=true; break; }
    }
    if (!clash && ex >= minEx) return c;
  }
  return fi + surnameKey.substring(0, Math.min(2, surnameKey.length));
}

const gi = i => initialsCache[i] !== undefined ? initialsCache[i] : String(i);

// ─── PLAYER BUTTON (targeted rebuild) ────────────────────────────────────────
function refBtn(s) {
  const b = document.querySelector('[data-s="'+s+'"]'); if (!b) return;
  const pi = state.slotp[s], ini = gi(pi);
  while (b.firstChild) b.removeChild(b.firstChild);
  if (state.ycarded[s]) { const e=document.createElement('span'); e.className='card-y'; b.appendChild(e); }
  if (state.bcarded[s]) { const e=document.createElement('span'); e.className='card-b'; b.appendChild(e); }
  if (state.rcarded[s]) { const e=document.createElement('span'); e.className='card-r'; b.appendChild(e); }
  if (state.ubench[pi]) { const e=document.createElement('span'); e.className='subdot'; b.appendChild(e); }
  const wrap = document.createElement('span');
  wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:0;line-height:1;';
  const iniSpan = document.createElement('span');
  iniSpan.textContent = ini;
  iniSpan.style.fontSize = ini.length>=4?'10px':ini.length===3?'11px':ini.length===2?'12px':'14px';
  wrap.appendChild(iniSpan);
  const g = state.playerGoals[pi]||0, p_ = state.playerPts[pi]||0;
  if (g > 0 || p_ > 0) {
    const sc = document.createElement('span');
    sc.textContent = g+'-'+p_;
    sc.style.cssText = 'font-size:9px;font-weight:400;opacity:0.75;margin-top:1px;';
    wrap.appendChild(sc);
  }
  b.appendChild(wrap);
}
const refAllBtns = () => { for (let s=1; s<=15; s++) refBtn(s); };

// ─── PERSISTENCE ──────────────────────────────────────────────────────────────
function saveState() {
  try {
    const {goals,pts,og,op_,period,secs,tStarted,tStopped,tPausedAt,
           usN,oppN,pnames,slotp,ubench,suboff,rcarded,ycarded,bcarded,
           playerGoals,playerPts,maxB,evts} = state;
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      goals,pts,og,op_,period,secs,tStarted,tStopped,tPausedAt,
      usN,oppN,pnames,slotp,ubench,suboff,rcarded,ycarded,bcarded,
      playerGoals,playerPts,maxB,evts
    }));
  } catch(e) {}
}

function loadSavedState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    Object.assign(state, JSON.parse(raw));
    return true;
  } catch(e) { return false; }
}

const clearSavedState = () => { try { localStorage.removeItem(SAVE_KEY); } catch(e) {} };

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(m) {
  el.toast.textContent = m; el.toast.classList.add('show');
  setTimeout(() => el.toast.classList.remove('show'), 2200);
}

// ─── SYNC META ────────────────────────────────────────────────────────────────
function syncMeta() {
  const n = state.evts.length;
  el.lcnt.textContent = n+' event'+(n!==1?'s':'');
  if (n>0) { el.lbdg.textContent=n; el.lbdg.style.display='inline'; } else el.lbdg.style.display='none';
  const ub = document.getElementById('undobtn');
  if (ub) ub.disabled = undos.length === 0;
}

// ─── TOTALS ───────────────────────────────────────────────────────────────────
function upTot() {
  const u = state.goals*3+state.pts, o = state.og*3+state.op_;
  el.utotal.textContent = '('+u+')';
  el.ototal.textContent = '('+o+')';
  const uc = u>o?'var(--ts)':u<o?'var(--td)':'var(--t2)';
  const oc = o>u?'var(--ts)':o<u?'var(--td)':'var(--t2)';
  el.utotal.style.color = uc;
  el.ototal.style.color = oc;
}

// ─── TIMER ────────────────────────────────────────────────────────────────────
const periodLabel = n => ['1st Half','2nd Half','1st Half ET','2nd Half ET'][n-1] || ('Period '+n);
const periodBadge = n => ['1H','2H','ET1','ET2'][n-1] || ('P'+n);

function timerMain() { if (!state.tStarted) startPeriod(); }

function startPeriod() {
  state.secs = 0;
  state.tWallStart = Date.now();
  state.tPausedAt  = 0;
  state.tStarted   = true;
  state.tStopped   = false;
  tRun = true;
  tInt = setInterval(tick, 500);
  el['timer-display'].textContent = '00:00';
  el['timer-display'].classList.remove('overtime');
  el.tbtn.style.display   = 'none';
  el.stopbtn.style.display = '';
  setGrid(true);
  const now = new Date();
  const clockStr = pad(now.getHours())+':'+pad(now.getMinutes());
  const desc = periodLabel(state.period)+' started at '+clockStr;
  addRow('00:00', periodBadge(state.period), 'bperiod', desc);
  pushUndo(desc, ()=>{});
}

function resumePeriod() {
  // Rebase wall clock so elapsed time is continuous from tPausedAt
  state.tWallStart = Date.now() - state.tPausedAt * 1000;
  state.tStarted   = true;
  state.tStopped   = false;
  tRun = true;
  tInt = setInterval(tick, 500);
  el.tbtn.style.display    = 'none';
  el.stopbtn.style.display = '';
  setGrid(true);
}

function stopTimer() {
  if (state.tWallStart) {
    state.tPausedAt = Math.floor((Date.now() - state.tWallStart) / 1000);
    state.secs      = state.tPausedAt;
  }
  clearInterval(tInt); tInt = null;
  tRun = false; state.tStarted = false; state.tStopped = true;
  el.stopbtn.style.display = 'none';
  setGrid(false);
  saveState();
  showStoppedOptions();
}

function tick() {
  const elapsed = Math.floor((Date.now() - state.tWallStart) / 1000);
  state.secs = elapsed;
  const td = el['timer-display'];
  td.textContent = fmt(elapsed);
  if (elapsed >= 1800 && !td.classList.contains('overtime')) td.classList.add('overtime');
  if (elapsed % 30 === 0) saveState();
}

function setGrid(on) {
  el.pgrid.style.opacity       = on ? '1' : '.3';
  el.pgrid.style.pointerEvents = on ? 'auto' : 'none';
}

// ─── STOPPED OPTIONS ──────────────────────────────────────────────────────────
function showStoppedOptions() {
  const nextLabel = periodLabel(state.period+1);
  el.mtitle.textContent = periodLabel(state.period)+' ended — what next?';
  el.mopts.innerHTML = '<div class="opts-grid">'
    +'<button class="abtn" data-v="next"   style="color:var(--ts);border-color:var(--bs);">'+esc(nextLabel)+'</button>'
    +'<button class="abtn" data-v="resume" style="color:var(--ti);border-color:var(--bi);">Resume '+esc(periodLabel(state.period))+'</button>'
    +'<button class="abtn" data-v="end"    style="color:var(--t2);border-color:var(--bm);">End game</button>'
    +'</div>';
  el.modal.style.display = 'block';
  el.modal.dataset.cancelAction = 'resume-period';
  el.mopts.querySelectorAll('.abtn').forEach(b => b.addEventListener('click', function(){
    const v = this.getAttribute('data-v');
    el.modal.dataset.cancelAction = '';
    closeMod();
    if      (v==='next')   { state.period++; startPeriod(); }
    else if (v==='resume') resumePeriod();
    else if (v==='end')    endGame();
  }));
}

// ─── END GAME ─────────────────────────────────────────────────────────────────
function endGame() {
  const u = state.goals*3+state.pts, o = state.og*3+state.op_;
  const result = u>o?'Win':o>u?'Loss':'Draw';
  const now = new Date();
  const clockStr = pad(now.getHours())+':'+pad(now.getMinutes());
  const desc = 'Game ended at '+clockStr+' — '+state.usN+' '+state.goals+'-'+state.pts+' ('+u+') v '+state.oppN+' '+state.og+'-'+state.op_+' ('+o+') — '+result;
  addRow(fmt(state.secs), 'END', 'bperiod', desc);
  el.mtitle.textContent = 'Game over';
  el.mopts.innerHTML =
    '<p style="font-size:15px;font-weight:500;color:var(--t1);padding:6px 0 4px;">'+esc(state.usN)+'</p>'
   +'<p style="font-size:32px;font-weight:500;color:var(--t1);padding:0 0 4px;line-height:1;">'+state.goals+'-'+state.pts+' <span style="font-size:16px;color:var(--t2);">('+u+')</span></p>'
   +'<p style="font-size:15px;font-weight:500;color:var(--t1);padding:4px 0;">'+esc(state.oppN)+'</p>'
   +'<p style="font-size:32px;font-weight:500;color:var(--t1);padding:0 0 16px;line-height:1;">'+state.og+'-'+state.op_+' <span style="font-size:16px;color:var(--t2);">('+o+')</span></p>'
   +'<p style="font-size:18px;font-weight:500;padding:0 0 12px;color:'+(result==='Win'?'var(--ts)':result==='Loss'?'var(--td)':'var(--t2)')+';">'+result+'</p>';
  el.modal.style.display = 'block';
  el.modal.dataset.cancelAction = 'dismiss';
  setGrid(false);
  const ub = document.getElementById('undobtn');
  if (ub) {
    ub.id='resetbtn'; ub.disabled=false; ub.classList.remove('danger');
    ub.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>Reset';
    ub.onclick=resetMatch;
  }
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function resetMatch() {
  el.mtitle.textContent = 'Reset match?';
  el.mopts.innerHTML = '<p style="font-size:14px;color:var(--t2);padding:4px 0 14px;line-height:1.5;">All scores, events and cards will be cleared. Team and player settings are kept.</p>'
    +'<button class="abtn" style="color:var(--td);border-color:var(--bd);">Clear everything and reset</button>';
  el.modal.style.display = 'block';
  el.mopts.querySelector('.abtn').addEventListener('click', () => { closeMod(); doReset(); });
}

function doReset() {
  state.goals=0; state.pts=0; state.og=0; state.op_=0;
  el.gc.textContent=0; el.pc.textContent=0; el.og.textContent=0; el.op.textContent=0;
  upTot();
  state.evts=[]; undos=[];
  el.evlog.innerHTML = '<div id="logempty" style="color:var(--t3);font-size:13px;padding:10px 0;">No events recorded yet</div>';
  el.logempty = document.getElementById('logempty');
  syncMeta();
  state.secs=0; state.tStarted=false; state.tStopped=false;
  state.tWallStart=null; state.tPausedAt=0;
  clearInterval(tInt); tInt=null; tRun=false;
  state.period=1;
  el['timer-display'].textContent='00:00';
  el['timer-display'].classList.remove('overtime');
  el.tbtn.style.display=''; el.stopbtn.style.display='none';
  setGrid(false);
  state.rcarded={}; state.ycarded={}; state.bcarded={};
  state.playerGoals={}; state.playerPts={};
  for (let s=1; s<=15; s++) {
    state.slotp[s]=s;
    const b=document.querySelector('[data-s="'+s+'"]');
    if (b) b.className='pbtn';
  }
  state.ubench={}; state.suboff={};
  const rb = document.getElementById('resetbtn');
  if (rb) {
    rb.id='undobtn'; rb.classList.add('danger');
    rb.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>Undo';
    rb.onclick=undoLast; rb.disabled=true;
  }
  refAllBtns();
  clearSavedState();
  toast('Match reset');
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function showOpts(title, opts, handler, rich) {
  el.mtitle.textContent = title;
  let html = '<div class="opts-grid">';
  if (rich) {
    opts.forEach(o => html += '<button class="abtn" data-v="'+esc(String(o.val))+'" style="text-align:left;"><div class="sarow"><span style="font-size:15px;color:var(--t1);">'+esc(o.label)+'</span>'+(o.sub?'<span style="font-size:11px;color:var(--t2);">'+esc(o.sub)+'</span>':'')+'</div></button>');
  } else {
    opts.forEach(o => {
      const sty = o==='Substitution' ? ' style="border-color:#25D366;color:#1a7a3c;"' : '';
      html += '<button class="abtn" data-v="'+esc(o)+'"'+sty+'>'+esc(o)+'</button>';
    });
  }
  html += '</div>';
  el.mopts.innerHTML = html;
  el.modal.style.display = 'block';
  el.mopts.querySelectorAll('.abtn').forEach(b => b.addEventListener('click', function(){ handler(this.getAttribute('data-v')); }));
}

function closeMod() {
  const ca = el.modal.dataset.cancelAction || '';
  el.modal.dataset.cancelAction = '';
  el.modal.style.display = 'none';
  selSlot=null; pendAct=null; subOff=null;
  if (ca==='resume-period') resumePeriod();
}

// ─── SCORE ADJUST ─────────────────────────────────────────────────────────────
function openScoreModal(side) {
  const isUs = side==='us';
  const name = isUs ? state.usN : state.oppN;
  el.mtitle.textContent = esc(name)+' — adjust score';
  el.mopts.innerHTML = '<div class="opts-grid">'
    +'<button class="abtn" data-v="g+" style="color:var(--td);border-color:var(--bd);">+ Goal</button>'
    +'<button class="abtn" data-v="p+" style="color:var(--ts);border-color:var(--bs);">+ Point</button>'
    +'<button class="abtn" data-v="g-" style="color:var(--t2);">− Goal</button>'
    +'<button class="abtn" data-v="p-" style="color:var(--t2);">− Point</button>'
    +'</div>';
  el.modal.style.display = 'block';
  el.mopts.querySelectorAll('.abtn').forEach(b => b.addEventListener('click', function(){
    const v = this.getAttribute('data-v');
    closeMod();
    if (isUs) adjUs(v[0], v[1]==='+'?1:-1, side);
    else      adjOpp(v[0], v[1]==='+'?1:-1, side);
  }));
}

function adjUs(t, d, side) {
  const prev = t==='g' ? state.goals : state.pts;
  const nxt  = Math.max(0, prev+d); if (nxt===prev) return;
  if (t==='g') { state.goals=nxt; el.gc.textContent=state.goals; }
  else          { state.pts=nxt;   el.pc.textContent=state.pts; }
  upTot();
  const desc = state.usN+': '+(t==='g'?'Goal':'Point')+' '+(d>0?'added':'removed');
  addRow(fmt(state.secs),'ADJ','badj',desc);
  const ct=t,cp=prev;
  pushUndo(desc,()=>{ if(ct==='g'){state.goals=cp;el.gc.textContent=state.goals;}else{state.pts=cp;el.pc.textContent=state.pts;} upTot(); });
  if (d>0) showRestartModal(side||'us');
}

function adjOpp(t, d, side) {
  const prev = t==='g' ? state.og : state.op_;
  const nxt  = Math.max(0, prev+d); if (nxt===prev) return;
  let type;
  if (t==='g') { state.og=nxt;  el.og.textContent=state.og;   type='Goal'; }
  else          { state.op_=nxt; el.op.textContent=state.op_;  type='Point'; }
  upTot();
  const desc = state.oppN+': '+type+' '+(nxt>prev?'added':'removed');
  addRow(fmt(state.secs),'OPP','bopp',desc);
  const ct=t,cp=prev;
  pushUndo(desc,()=>{ if(ct==='g'){state.og=cp;el.og.textContent=state.og;}else{state.op_=cp;el.op.textContent=state.op_;} upTot(); });
  if (d>0) showRestartModal(side||'opp');
}

// ─── RESTART ──────────────────────────────────────────────────────────────────
function showRestartModal(side) {
  const label = side==='us' ? "Opposition's Restart" : "Own Restart";
  el.mtitle.textContent = 'Restart won?';
  el.mopts.innerHTML = '<div class="opts-grid">'
    +'<button class="abtn" data-v="Won"     style="color:var(--ts);border-color:var(--bs);">Won</button>'
    +'<button class="abtn" data-v="Lost"    style="color:var(--td);border-color:var(--bd);">Lost</button>'
    +'<button class="abtn" data-v="Unclear">Unclear</button>'
    +'</div>';
  el.modal.style.display = 'block';
  el.mopts.querySelectorAll('.abtn').forEach(b => b.addEventListener('click', function(){
    const result = this.getAttribute('data-v');
    closeMod();
    const desc = label+': '+result;
    addRow(fmt(state.secs),'RSTR','brstr',desc);
    pushUndo(desc,()=>{});
  }));
}

// ─── EVENT LOG ────────────────────────────────────────────────────────────────
const tail = () => { el.evlog.scrollTop = el.evlog.scrollHeight; };

function addRow(time, badge, cls, desc) {
  state.evts.push({time, badge, cls, desc});
  el.logempty.style.display = 'none';
  const r = document.createElement('div');
  r.className = 'ev-row'+(selMode?' sel-mode':'');
  r.dataset.evIdx = state.evts.length - 1;
  r.innerHTML = '<div class="ev-check"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--ti)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="20 6 9 17 4 12"/></svg></div>'
    +'<span class="ev-time">'+time+'</span>'
    +'<span class="ev-bdg '+cls+'">'+esc(badge)+'</span>'
    +'<span style="color:var(--t1);font-size:13px;flex:1;">'+esc(desc)+'</span>';
  r.addEventListener('click', () => toggleRow(r));
  el.evlog.appendChild(r);
  tail(); syncMeta(); saveState();
}

// ─── UNDO ─────────────────────────────────────────────────────────────────────
function pushUndo(lbl, fn) { undos.push({label:lbl, revert:fn}); syncMeta(); }

function undoLast() {
  if (!undos.length) return;
  const op = undos.pop(); op.revert();
  state.evts.pop();
  if (selMode) {
    selMode = false;
    el.seltoggle.classList.remove('active');
    el.removebar.classList.remove('show');
  }
  const rows = el.evlog.querySelectorAll('.ev-row');
  if (rows.length) rows[rows.length-1].remove();
  if (!state.evts.length) el.logempty.style.display='';
  syncMeta(); saveState(); toast('Undone: '+op.label);
}

// ─── SELECTION ────────────────────────────────────────────────────────────────
function toggleSelMode() {
  selMode = !selMode;
  el.evlog.querySelectorAll('.ev-row').forEach(r => {
    r.classList.toggle('sel-mode', selMode);
    if (!selMode) r.classList.remove('selected');
  });
  el.seltoggle.classList.toggle('active', selMode);
  if (!selMode) el.removebar.classList.remove('show');
  updateRemoveBar();
}

function toggleRow(rowEl) {
  if (!selMode) return;
  rowEl.classList.toggle('selected');
  const chk = rowEl.querySelector('.ev-check svg');
  if (chk) chk.style.display = rowEl.classList.contains('selected') ? 'block' : 'none';
  updateRemoveBar();
}

function updateRemoveBar() {
  const n = el.evlog.querySelectorAll('.ev-row.selected').length;
  el.removelbl.textContent = n+' selected';
  el.removebar.classList.toggle('show', selMode && n>0);
}

function clearSelection() {
  el.evlog.querySelectorAll('.ev-row.selected').forEach(r => {
    r.classList.remove('selected');
    const chk = r.querySelector('.ev-check svg'); if (chk) chk.style.display='none';
  });
  updateRemoveBar();
}

function removeSelected() {
  const rows = Array.from(el.evlog.querySelectorAll('.ev-row'));
  const toRemove = rows.map((r,i) => r.classList.contains('selected')?i:-1).filter(i=>i>=0);
  for (let i=toRemove.length-1; i>=0; i--) { rows[toRemove[i]].remove(); state.evts.splice(toRemove[i],1); }
  undos = [];
  if (!state.evts.length) el.logempty.style.display='';
  selMode=false; el.seltoggle.classList.remove('active'); el.removebar.classList.remove('show');
  syncMeta(); saveState();
  toast('Removed '+toRemove.length+' event'+(toRemove.length!==1?'s':''));
}

// ─── PLAYER ACTIONS ───────────────────────────────────────────────────────────
function sel(s) {
  if (!tRun || state.rcarded[s]) return;
  selSlot = s;
  showOpts(pl(state.slotp[s])+' — select action', ACTS, actCb, false);
}

function actCb(a) {
  if (a==='Substitution') { subOff=selSlot; pickSubOn(); return; }
  pendAct = a;
  const sec = NS[a];
  if (sec) {
    const titles = {Goal:'Goal — how scored?',Point:'Point — how scored?',Wide:'Wide — how attempted?',Free:'Free — reason?'};
    showOpts(titles[a], sec, secCb, false);
  } else { logEv(a,null); closeMod(); }
}

function secCb(s) {
  const act = pendAct;
  logEv(pendAct, s);
  closeMod();
  if (act==='Goal'||act==='Point'||act==='Wide') showRestartModal('us');
}

function badgeCls(a) {
  if(a==='Goal')return 'bg'; if(a==='Point')return 'bp'; if(a==='Wide')return 'bw';
  if(a==='Red Card')return 'br'; if(a.indexOf('Card')>=0)return 'bc'; return 'bo';
}

function logEv(action, sec) {
  const slot = selSlot, pi = state.slotp[slot];
  const prevG  = state.goals, prevP = state.pts;
  const prevPG = state.playerGoals[pi]||0, prevPP = state.playerPts[pi]||0;

  if (action==='Goal')  { state.goals++; el.gc.textContent=state.goals; state.playerGoals[pi]=prevPG+1; }
  if (action==='Point') { state.pts++;   el.pc.textContent=state.pts;   state.playerPts[pi]=prevPP+1;   }
  if (action==='Goal'||action==='Point') { upTot(); refBtn(slot); }

  if (action==='Red Card') {
    state.rcarded[slot]=true;
    const b=document.querySelector('[data-s="'+slot+'"]');
    if(b){ b.classList.remove('hev','sub'); b.classList.add('rc'); const e=document.createElement('span'); e.className='card-r'; b.appendChild(e); }
  }
  if (action==='Yellow Card') {
    state.ycarded[slot]=(state.ycarded[slot]||0)+1;
    const b=document.querySelector('[data-s="'+slot+'"]');
    if(b&&!b.querySelector('.card-y')){ const e=document.createElement('span'); e.className='card-y'; b.appendChild(e); }
  }
  if (action==='Black Card') {
    state.bcarded[slot]=(state.bcarded[slot]||0)+1;
    const b=document.querySelector('[data-s="'+slot+'"]');
    if(b&&!b.querySelector('.card-b')){ const e=document.createElement('span'); e.className='card-b'; b.appendChild(e); }
  }

  const desc = pl(pi)+': '+action+(sec?' · '+sec:'');
  if (action!=='Red Card') {
    const b=document.querySelector('[data-s="'+slot+'"]');
    if(b&&!b.classList.contains('rc')) b.classList.add('hev');
  }
  addRow(fmt(state.secs), gi(pi), badgeCls(action), desc);
  // Tag the event with slot/action for accurate undo hev check
  const ev = state.evts[state.evts.length-1];
  ev.slot=slot; ev.action=action;

  pushUndo(desc, () => {
    if (action==='Goal')  { state.goals=prevG; el.gc.textContent=state.goals; state.playerGoals[pi]=prevPG; upTot(); refBtn(slot); }
    if (action==='Point') { state.pts=prevP;   el.pc.textContent=state.pts;   state.playerPts[pi]=prevPP;   upTot(); refBtn(slot); }
    if (action==='Red Card') {
      delete state.rcarded[slot];
      const b=document.querySelector('[data-s="'+slot+'"]');
      if(b){ b.classList.remove('rc'); const c=b.querySelector('.card-r'); if(c)c.remove(); }
    }
    if (action==='Yellow Card') {
      state.ycarded[slot]=(state.ycarded[slot]||1)-1;
      if(state.ycarded[slot]<=0){ delete state.ycarded[slot]; const b=document.querySelector('[data-s="'+slot+'"]'); const c=b&&b.querySelector('.card-y'); if(c)c.remove(); }
    }
    if (action==='Black Card') {
      state.bcarded[slot]=(state.bcarded[slot]||1)-1;
      if(state.bcarded[slot]<=0){ delete state.bcarded[slot]; const b=document.querySelector('[data-s="'+slot+'"]'); const c=b&&b.querySelector('.card-b'); if(c)c.remove(); }
    }
    const b2=document.querySelector('[data-s="'+slot+'"]');
    const still=state.evts.some(e=>e.slot===slot);
    if(b2){ if(still)b2.classList.add('hev'); else b2.classList.remove('hev'); }
  });
}

// ─── SUBSTITUTION ─────────────────────────────────────────────────────────────
function pickSubOn() {
  const used={};
  for (let s=1; s<=15; s++) used[state.slotp[s]]=true;
  const isGK = subOff===1, avail=[];
  for (let idx=16; idx<=state.maxB+5; idx++) {
    if(used[idx])continue;
    const n=gn(idx); if(!n&&idx>state.maxB)continue;
    const gks=idx===16; if(isGK&&!gks)continue; if(!isGK&&gks)continue;
    avail.push({val:String(idx),label:(n||'#'+idx),sub:gks?'Sub GK':'Outfield sub'});
  }
  for (let pidx in state.suboff) {
    pidx=parseInt(pidx); if(used[pidx])continue;
    if(isGK!==(state.suboff[pidx]===1))continue;
    if(state.rcarded[state.suboff[pidx]])continue;
    avail.push({val:String(pidx),label:(gn(pidx)||'#'+pidx),sub:'Previously subbed off'});
  }
  if (!avail.length) {
    el.mtitle.textContent='No subs available';
    el.mopts.innerHTML='<p style="color:var(--t2);font-size:14px;padding:8px 0 4px;">No players available.</p>';
    return;
  }
  showOpts('Who comes on?', avail, v => execSub(parseInt(v)), true);
}

function execSub(bi) {
  const sl=subOff, out=state.slotp[sl];
  state.suboff[out]=sl; state.slotp[sl]=bi; state.ubench[bi]=true;
  if(state.suboff[bi])delete state.suboff[bi];
  const desc='Sub: '+pl(out)+' off / '+pl(bi)+' on (pos '+sl+')';
  const btn=document.querySelector('[data-s="'+sl+'"]'); if(btn)btn.classList.add('sub');
  addRow(fmt(state.secs),'SUB','bs',desc);
  const ev=state.evts[state.evts.length-1]; ev.slot=sl; ev.action='sub';
  const cs=sl,co=out,ci=bi;
  pushUndo(desc,()=>{
    state.slotp[cs]=co; delete state.suboff[co]; delete state.ubench[ci]; state.suboff[ci]=cs;
    const b2=document.querySelector('[data-s="'+cs+'"]');
    if(b2){ b2.classList.remove('sub'); if(state.ubench[co])b2.classList.add('sub'); }
    refBtn(cs);
  });
  refBtn(sl); closeMod();
}

// ─── SHARE ────────────────────────────────────────────────────────────────────
function shareWA() {
  const u=state.goals*3+state.pts, o=state.og*3+state.op_;
  const lines=['*'+state.usN+': '+state.goals+'-'+state.pts+' ('+u+') v '+state.oppN+': '+state.og+'-'+state.op_+' ('+o+')*','*Time: '+fmt(state.secs)+'*',''];
  state.evts.forEach(e => lines.push(e.time+'  '+e.desc));
  window.open('https://wa.me/?text='+encodeURIComponent(lines.join('\n')),'_blank');
}

// ─── LOG PANEL ────────────────────────────────────────────────────────────────
function openLog()  { el.logpanel.classList.add('open');    tail(); }
function closeLog() { el.logpanel.classList.remove('open'); }

// ─── TEMPLATES ────────────────────────────────────────────────────────────────
function saveTpl() {
  const name = el.tni.value.trim(); if(!name){toast('Enter a template name');return;}
  const data = {usName:el.sun.value.trim()||state.usN, playerNames:{}};
  for(let i=1;i<=state.maxB+2;i++){const inp=document.getElementById('sn'+i);if(inp&&inp.value.trim())data.playerNames[i]=inp.value.trim();}
  try{localStorage.setItem('tpl:'+name,JSON.stringify(data));toast('Saved "'+name+'"');el.tni.value='';renderTpls();}catch(e){toast('Save failed');}
}

function loadTpl(name) {
  try{
    const raw=localStorage.getItem('tpl:'+name); if(!raw)return;
    const data=JSON.parse(raw);
    if(data.usName)el.sun.value=data.usName;
    state.maxB=17; // reset so stale slots don't accumulate
    if(data.playerNames){
      for(let i=1;i<=30;i++){
        const inp=document.getElementById('sn'+i); if(inp)inp.value=data.playerNames[i]||'';
        if(data.playerNames[i]&&i>=state.maxB)state.maxB=i+1;
      }
    }
    toast('Loaded "'+name+'"');
  }catch(e){toast('Load failed');}
}

function delTpl(name){try{localStorage.removeItem('tpl:'+name);renderTpls();toast('Deleted');}catch(e){}}

function renderTpls(){
  const keys=[];
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('tpl:'))keys.push(k);}
  if(!keys.length){el.tpllist.innerHTML='<div style="font-size:13px;color:var(--t3);padding:4px 0;">No saved templates</div>';return;}
  el.tpllist.innerHTML=keys.map(k=>{
    const n=k.replace('tpl:','');
    return '<div class="tplrow"><span style="flex:1;font-size:14px;">'+esc(n)+'</span><button class="tplbtn load" onclick="loadTpl(\''+esc(n)+'\')">Load</button><button class="tplbtn del" onclick="delTpl(\''+esc(n)+'\')">Delete</button></div>';
  }).join('');
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────
function openSettings(){
  el.sun.value=state.usN;
  el.son.value=state.oppN==='Opposition'?'':state.oppN;
  el.pslist.innerHTML='';
  for(let i=1;i<=15;i++){
    const row=document.createElement('div'); row.className='prow';
    row.innerHTML='<div class="pbadge'+(i===1?' gk':'')+'">'+i+'</div><input class="sinput" id="sn'+i+'" type="text" placeholder="'+(i===1?'Goalkeeper':'Player '+i)+'" maxlength="30" value="'+esc(gn(i)||'')+'">';
    el.pslist.appendChild(row);
  }
  renderBench(); renderTpls();
  el.setpanel.classList.add('open');
}

function closeSettings(){el.setpanel.classList.remove('open');}

function renderBench(){
  el.bslist.innerHTML='';
  for(let i=16;i<=state.maxB;i++) addBRow(el.bslist,i);
}

function addBRow(c,idx){
  const row=document.createElement('div'); row.className='prow'; row.id='br'+idx;
  row.innerHTML='<div class="pbadge sub">'+idx+'</div><input class="sinput" id="sn'+idx+'" type="text" placeholder="'+(idx===16?'Sub GK':'Sub #'+idx)+'" maxlength="30" value="'+esc(gn(idx)||'')+'">';
  c.appendChild(row);
  document.getElementById('sn'+idx).addEventListener('input',function(){
    const ti=parseInt(this.id.replace('sn',''));
    if(this.value.trim()&&ti>=state.maxB){
      state.maxB=ti+1;
      if(!document.getElementById('br'+state.maxB)) addBRow(el.bslist,state.maxB);
    }
  });
}

function saveSettings(){
  state.usN  = el.sun.value.trim()||DEFAULT_US;
  state.oppN = el.son.value.trim()||'Opposition';
  el.uslbl.textContent=state.usN.toUpperCase();
  el.opplbl.textContent=state.oppN.toUpperCase();
  for(let i=1;i<=state.maxB+2;i++){const inp=document.getElementById('sn'+i);if(inp)state.pnames[i]=inp.value.trim();}
  buildInitialsCache();
  refAllBtns();
  closeSettings();
  saveState();
  toast('Settings saved');
}

// ─── RESTORE UI FROM PERSISTED STATE ─────────────────────────────────────────
function restoreUI() {
  el.gc.textContent=state.goals; el.pc.textContent=state.pts;
  el.og.textContent=state.og;    el.op.textContent=state.op_;
  upTot();
  el.uslbl.textContent=state.usN.toUpperCase();
  el.opplbl.textContent=state.oppN.toUpperCase();
  el['timer-display'].textContent=fmt(state.secs);
  if(state.secs>=1800) el['timer-display'].classList.add('overtime');
  // If was running when page closed, resume in paused state at recorded time
  if(state.tStarted || state.tStopped) {
    el.tbtn.style.display='none';
    el.stopbtn.style.display='';
    state.tStarted=false; // require explicit resume
  }
  // Rebuild event log DOM from stored events
  state.evts.forEach(e => {
    const r=document.createElement('div'); r.className='ev-row';
    r.innerHTML='<div class="ev-check"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--ti)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="20 6 9 17 4 12"/></svg></div>'
      +'<span class="ev-time">'+e.time+'</span>'
      +'<span class="ev-bdg '+(e.cls||'bo')+'">'+esc(e.badge||'')+'</span>'
      +'<span style="color:var(--t1);font-size:13px;flex:1;">'+esc(e.desc||'')+'</span>';
    r.addEventListener('click',()=>toggleRow(r));
    el.evlog.appendChild(r);
  });
  if(state.evts.length) el.logempty.style.display='none';
  // Apply slot/card/sub classes
  const slotsWithEvts=new Set(state.evts.filter(e=>e.slot&&e.action&&e.action!=='sub').map(e=>e.slot));
  for(let s=1;s<=15;s++){
    const b=document.querySelector('[data-s="'+s+'"]'); if(!b) continue;
    if(state.rcarded[s])        b.classList.add('rc');
    else if(slotsWithEvts.has(s)) b.classList.add('hev');
    if(state.ubench[state.slotp[s]]) b.classList.add('sub');
  }
  buildInitialsCache();
  refAllBtns();
  syncMeta();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  initEl();
  const restored = loadSavedState();
  if (restored) {
    restoreUI();
    toast('Match restored');
  } else {
    buildInitialsCache();
    refAllBtns();
    upTot();
    syncMeta();
  }
}

init();
</script>
</body>
</html>
